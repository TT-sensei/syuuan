<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サクサク週案</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Shippori+Mincho:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   CSS変数・リセット
═══════════════════════════════════════════ */
:root {
  --bg:        #f4f1ec;
  --surface:   #fdfaf6;
  --surface2:  #ede9e0;
  --border:    #d4cdc0;
  --border-dk: #b8b0a0;
  --text:      #2c2820;
  --sub:       #7a7060;
  --accent:    #5c6e3f;
  --accent2:   #8b5e3c;
  --accent-lt: #d4dfc8;
  --red:       #c0392b;
  --blue:      #2d6a9f;

  --c-kokugo:    #fef3c7;
  --c-syasya:    #d1fae5;
  --c-sansu:     #dbeafe;
  --c-seikatsu:  #fef9c3;
  --c-rika:      #ccfbf1;
  --c-shakai:    #fee2e2;
  --c-ongaku:    #ede9fe;
  --c-zukou:     #ffedd5;
  --c-katei:     #bfdbfe;
  --c-taiiku:    #fde68a;
  --c-dotoku:    #cffafe;
  --c-gaikokugo: #dcfce7;
  --c-sogo:      #fce7f3;
  --c-gakkatsu:  #e0e7ff;
  --c-gyoji:     #fff7ed;
  --c-iinkai:    #a5f3fc;
  --c-club:      #fecdd3;
  --c-kekka:     #e5e7eb;

  --r: 6px;
  --shadow: 0 1px 4px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.04);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}

button, input, select, textarea { font-family: inherit; }

/* ═══════════════════════════════════════════
   編集画面レイアウト
═══════════════════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ─── トップバー ─── */
#topbar {
  background: var(--surface);
  border-bottom: 2px solid var(--border-dk);
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  height: 48px;
  flex-shrink: 0;
  z-index: 100;
}
.app-logo {
  font-family: 'Shippori Mincho', serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .06em;
  white-space: nowrap;
  margin-right: 4px;
}
.sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }
.top-info {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
}
.top-info .edit-link {
  font-size: 11px;
  color: var(--sub);
  cursor: pointer;
  text-decoration: underline;
}
.spacer { flex: 1; }
.tb-btn {
  height: 32px;
  padding: 0 14px;
  border-radius: var(--r);
  border: 1.5px solid var(--border-dk);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
  transition: background .12s, color .12s;
}
.tb-btn:hover { background: var(--surface2); }
.tb-btn.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.tb-btn.primary:hover { opacity: .88; }

/* ─── タブバー ─── */
#tabbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  padding: 0 16px;
  gap: 2px;
  flex-shrink: 0;
}
.tab {
  padding: 8px 18px 6px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--sub);
  border-bottom: 3px solid transparent;
  margin-bottom: -1px;
  transition: color .15s, border-color .15s;
}
.tab:hover { color: var(--accent); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ─── ページ ─── */
.page { display: none; }
.page.active { display: flex; flex: 1; overflow: hidden; }

/* ─── 週案ページ ─── */
#main-page { flex-direction: row; gap: 0; }

.pane-left {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 12px;
  gap: 10px;
}
.pane-right {
  width: 280px;
  flex-shrink: 0;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 12px;
  gap: 12px;
}

/* ─── 週ナビ ─── */
#week-nav {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 8px 14px;
  box-shadow: var(--shadow);
  flex-shrink: 0;
}
.wn-arrow {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 1.5px solid var(--border-dk);
  background: var(--surface);
  cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s; flex-shrink: 0;
}
.wn-arrow:hover { background: var(--surface2); }
#wn-center { flex: 1; text-align: center; }
#wn-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 19px; font-weight: 700;
  color: var(--accent); letter-spacing: .04em;
}
#wn-range { font-size: 11px; color: var(--sub); margin-top: 2px; }
.wn-dots { display: flex; justify-content: center; gap: 5px; margin-top: 4px; }
.wn-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--border-dk); cursor: pointer;
  transition: background .15s, transform .15s;
}
.wn-dot.cur { background: var(--accent); transform: scale(1.35); }
.wn-dot.has { background: var(--accent2); opacity: .6; }
.wn-controls { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }

/* ─── テーブルエリア ─── */
.table-scroll {
  flex: 1; overflow: auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--shadow);
}
table#grid { border-collapse: collapse; width: 100%; table-layout: fixed; }
table#grid colgroup .col-time { width: 30px; }
th, td { border: 1px solid var(--border); font-size: 13px; }

thead tr th {
  background: var(--surface2);
  text-align: center; font-weight: 900;
  padding: 7px 4px; font-size: 13px;
  border-bottom: 2px solid var(--border-dk);
  position: sticky; top: 0; z-index: 10;
  vertical-align: middle;
}
.th-date { display: block; font-size: 11px; font-weight: 500; color: var(--sub); margin-top: 1px; }
th.col-holiday { background: #fff0f0 !important; color: #900 !important; }
th.col-furikyu { background: #eff2ff !important; color: #223 !important; }
.th-flag {
  display: inline-block; font-size: 10px; font-weight: 900;
  padding: 1px 5px; border-radius: 3px; margin-left: 3px; cursor: pointer;
}
.th-flag.h { background: #e06060; color: #fff; }
.th-flag.f { background: #6080e0; color: #fff; }
.th-flag.n { background: var(--border); color: var(--sub); font-size: 10px; }

.time-cell {
  background: var(--surface2) !important;
  text-align: center; font-weight: 900; font-size: 13px;
  color: var(--accent);
  border-right: 2px solid var(--border-dk) !important;
  vertical-align: middle; padding: 2px 1px;
  writing-mode: vertical-rl; letter-spacing: .08em;
}

.break-row .data-cell { background: #f9f7f3; padding: 4px 7px; vertical-align: top; }
.break-row .data-cell .cell-txt { font-size: 12px; color: var(--sub); min-height: 22px; outline: none; line-height: 1.55; }
.break-row.row-asa .data-cell  { background: #f3f7ef; }
.break-row.row-naka .data-cell { background: #f5f5f5; }
.break-row.row-hiru .data-cell { background: #f5f5f5; }
.break-row.row-items .data-cell { background: #fdf9f3; border-top: 2px solid var(--border-dk) !important; }

.class-row td.data-cell { vertical-align: top; padding: 5px 7px; cursor: pointer; position: relative; }
.class-row td.data-cell .cell-sub {
  font-size: 14px; font-weight: 900; outline: none;
  padding-bottom: 3px; margin-bottom: 3px;
  border-bottom: 1.5px solid rgba(0,0,0,.12);
  line-height: 1.3; color: #1a1612; letter-spacing: .03em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.class-row td.data-cell .cell-txt {
  font-size: 11px; color: #5a4e3e; outline: none; line-height: 1.55; min-height: 32px;
}
[contenteditable]:empty::before { content: attr(data-ph); color: #ccc; pointer-events: none; }

td.data-cell.active-cell { box-shadow: inset 0 0 0 2.5px var(--accent) !important; background: #fffdf8 !important; }
td.cell-holiday {
  background: repeating-linear-gradient(135deg,#fff8f8,#fff8f8 5px,#ffe8e8 5px,#ffe8e8 10px) !important;
  pointer-events: none;
}
td.cell-furikyu {
  background: repeating-linear-gradient(135deg,#f8f8ff,#f8f8ff 5px,#e8eaff 5px,#e8eaff 10px) !important;
  pointer-events: none;
}
.day-label-box { position: absolute; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.day-label-inner { writing-mode: vertical-rl; font-size: 16px; font-weight: 900; letter-spacing: .15em; color: #900; opacity: .7; }
.day-label-inner.furi { color: #226; }
td.cell-kekka { background: var(--c-kekka) !important; position: relative; }
td.cell-kekka::after {
  content: ""; position: absolute; inset: 0;
  background: repeating-linear-gradient(135deg, transparent, transparent 5px, rgba(0,0,0,.08) 5px, rgba(0,0,0,.08) 7px);
  pointer-events: none;
}
td.cell-empty { outline: 2px dashed #e8a880 !important; outline-offset: -2px; }

#notice-area {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); box-shadow: var(--shadow);
  flex-shrink: 0; padding: 10px 12px;
}
#notice-label {
  font-size: 12px; font-weight: 700; color: var(--sub);
  margin-bottom: 6px; display: flex; align-items: center; gap: 4px;
  border-bottom: 1px solid var(--border); padding-bottom: 5px;
}
#notice-pad {
  outline: none; font-size: 13px; line-height: 1.7;
  min-height: 44px; max-height: 100px; overflow-y: auto; color: var(--text);
}
#notice-pad:empty::before { content: "連絡・おしらせなど…"; color: #ccc; }

/* ─── サイドパネル ─── */
.panel-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r); padding: 10px; }
.panel-card h3 {
  font-size: 12px; font-weight: 900; color: var(--sub);
  text-transform: uppercase; letter-spacing: .08em;
  margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border);
}
.palette-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
.pal-btn {
  border: 1px solid rgba(0,0,0,.1); border-radius: 4px;
  padding: 6px 2px; text-align: center; cursor: pointer;
  font-size: 11px; font-weight: 700; transition: transform .1s, box-shadow .1s;
}
.pal-btn:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,.1); }
#hist-area { margin-top: 8px; padding-top: 7px; border-top: 1px dashed var(--border); font-size: 11px; }
#hist-area .hist-label { color: var(--sub); font-weight: 700; margin-bottom: 5px; }
#hist-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.hist-chip {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 3px 9px; font-size: 11px; cursor: pointer;
  max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  transition: background .1s;
}
.hist-chip:hover { background: var(--accent-lt); }

.jisu-mini { width: 100%; border-collapse: collapse; font-size: 11px; }
.jisu-mini th {
  background: var(--surface2); padding: 3px 5px; text-align: center;
  font-size: 10px; border: 1px solid var(--border); color: var(--sub);
}
.jisu-mini td { padding: 2px 5px; border: 1px solid var(--border); font-size: 11px; }
.jisu-mini td.num { text-align: right; font-variant-numeric: tabular-nums; }
.jisu-mini td.warn { color: var(--red); font-weight: 700; }
.plan-inp {
  width: 42px; border: 1px solid var(--border); border-radius: 3px;
  padding: 1px 3px; font-size: 11px; text-align: right; background: var(--surface);
}
.plan-inp:focus { border-color: var(--accent); outline: none; }

.tool-btn {
  width: 100%; text-align: left; background: var(--surface);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 6px 9px; font-size: 12px; font-weight: 700;
  cursor: pointer; margin-bottom: 4px;
  transition: background .1s, color .1s; display: block;
}
.tool-btn:hover { background: var(--surface2); color: var(--accent); }

/* ─── 時数ページ ─── */
#jisu-page { flex-direction: column; padding: 16px; overflow-y: auto; gap: 14px; }
#jisu-page h2 { font-family: 'Shippori Mincho', serif; font-size: 18px; color: var(--accent); font-weight: 700; }
#jisu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
.jisu-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); }
.jisu-card-head { padding: 7px 12px; font-weight: 700; font-size: 13px; border-bottom: 1px solid var(--border); }
.jisu-card-body { padding: 9px 12px; font-size: 12px; display: flex; flex-direction: column; gap: 5px; }
.jisu-row { display: flex; justify-content: space-between; align-items: center; }
.jisu-bar-bg { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.jisu-bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }

/* ─── 設定モーダル ─── */
#modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.35); z-index: 200;
  align-items: center; justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal-box {
  background: var(--surface); border-radius: 10px;
  padding: 24px 28px; width: 380px;
  box-shadow: 0 8px 40px rgba(0,0,0,.18);
}
#modal-box h2 { font-family: 'Shippori Mincho', serif; font-size: 18px; color: var(--accent); margin-bottom: 16px; }
.modal-field { margin-bottom: 12px; }
.modal-field label { display: block; font-size: 11px; font-weight: 700; color: var(--sub); margin-bottom: 4px; letter-spacing: .04em; }
.modal-field input, .modal-field select {
  width: 100%; padding: 7px 10px;
  border: 1.5px solid var(--border-dk); border-radius: 5px;
  font-size: 14px; background: var(--bg); color: var(--text); outline: none;
}
.modal-field input:focus, .modal-field select:focus { border-color: var(--accent); }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

/* ─── トースト ─── */
#toast {
  position: fixed; bottom: 20px; right: 18px;
  background: var(--accent); color: #fff;
  padding: 7px 18px; border-radius: 20px;
  font-size: 12px; font-weight: 700;
  box-shadow: 0 4px 14px rgba(0,0,0,.18);
  opacity: 0; transform: translateY(10px);
  transition: opacity .25s, transform .25s;
  pointer-events: none; z-index: 300;
}
#toast.show { opacity: 1; transform: translateY(0); }

/* ─── ドロップゾーン ─── */
#drop-zone {
  border: 2px dashed var(--border-dk); border-radius: 5px;
  padding: 8px; text-align: center; font-size: 11px;
  color: var(--sub); cursor: pointer; transition: border-color .15s, background .15s;
}
#drop-zone:hover, #drop-zone.over { border-color: var(--accent); background: var(--accent-lt); color: var(--accent); }

/* ─── 行高さ ─── */
.class-row td { height: 62px; }
.row-asa td   { height: 28px; }
.row-naka td  { height: 20px; }
.row-hiru td  { height: 20px; }
.row-items td { height: 38px; }

/* ═══════════════════════════════════════════
   印刷専用スタイル
═══════════════════════════════════════════ */
#print-area { display: none; }

@media print {
  @page {
    size: A4 portrait;
    margin: 0;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: #fff !important;
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  /* 編集UIを全部消す */
  #app { display: none !important; }
  #modal-overlay { display: none !important; }
  #toast { display: none !important; }

  /* 印刷エリアを表示 */
  #print-area {
    display: block !important;
    width: 210mm;
    height: 297mm;
    box-sizing: border-box;
    padding: 8mm 8mm 6mm 8mm;
    font-family: "游ゴシック", "Yu Gothic", "メイリオ", Meiryo, sans-serif;
    font-size: 9pt;
    line-height: 1.3;
    color: #000;
    background: #fff;
    overflow: hidden;
  }

  /*
   * ★ 高さ計算メモ（A4縦）
   * 用紙: 297mm。padding: 8mm上下 = 16mm消費 → 内側: 281mm = 約796pt
   * おしらせ欄: ラベル12pt + 本文60pt + margin+border ≒ 80pt
   * テーブル用: 796 - 80 = 約716pt
   *
   * テーブル行構成:
   *   タイトル行:  22pt
   *   ヘッダー行:  22pt
   *   朝:          14pt
   *   1〜2校時: 2 × 90pt = 180pt
   *   中休み:      10pt
   *   3〜4校時: 2 × 90pt = 180pt
   *   昼①:        10pt
   *   昼②:        10pt
   *   5〜6校時: 2 × 90pt = 180pt
   *   持ち物:      28pt
   *   合計: 22+22+14+180+10+180+10+10+180+28 = 656pt ← おしらせ80pt込みで736pt ≒ OK
   */

  /* 印刷テーブル本体 */
  #print-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    word-wrap: break-word;
    overflow-wrap: anywhere;
  }

  #print-table th,
  #print-table td {
    border: 0.5pt solid #888;
    padding: 0;
    overflow: hidden;
    vertical-align: top;
    word-wrap: break-word;
    overflow-wrap: anywhere;
  }

  /* タイトル行 */
  .pt-title-row th {
    border: none !important;
    text-align: center;
    height: 22pt !important;
    font-size: 16pt;
    font-weight: 900;
    letter-spacing: .08em;
    vertical-align: middle;
    padding: 0;
  }

  /* ヘッダー行（曜日・日付） */
  .pt-header-row th {
    background: #f0ede8 !important;
    text-align: center;
    font-size: 8pt;
    font-weight: 900;
    height: 22pt !important;
    vertical-align: middle;
    padding: 1pt 2pt;
    border-bottom: 1.5pt solid #555 !important;
  }
  .pt-header-row th.th-holiday-col { background: #fff0f0 !important; color: #900 !important; }
  .pt-header-row th.th-furikyu-col { background: #eff2ff !important; color: #226 !important; }
  .pt-header-date { font-size: 6.5pt; font-weight: 500; color: #555; display: block; margin-top: 1pt; }

  /* 時間列（全行共通） */
  .pt-time-col {
    background: #eeebe5 !important;
    width: 14pt !important;
    text-align: center;
    vertical-align: middle;
    font-size: 7pt;
    font-weight: 900;
    color: #333;
    border-right: 1.5pt solid #888 !important;
    writing-mode: vertical-rl;
    padding: 0;
  }

  /* ── 授業セル（1〜6校時） ── */
  /* height は各行のtrに !important で付けるのが最も確実 */
  tr.pt-class-row td {
    height: 90pt !important;
  }
  tr.pt-class-row td.pt-class-cell {
    padding: 3pt 4pt !important;
    vertical-align: top;
  }
  .pt-class-cell.pt-holiday {
    background: repeating-linear-gradient(135deg,#fff8f8,#fff8f8 3pt,#fde8e8 3pt,#fde8e8 5pt) !important;
  }
  .pt-class-cell.pt-furikyu {
    background: repeating-linear-gradient(135deg,#f8f8ff,#f8f8ff 3pt,#e8eaff 3pt,#e8eaff 5pt) !important;
  }
  .pt-sub {
    font-size: 10pt;
    font-weight: 900;
    line-height: 1.3;
    display: block;
    color: #000;
    padding-bottom: 2pt;
    margin-bottom: 2pt;
    border-bottom: 0.5pt dashed #bbb;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pt-txt {
    font-size: 7.5pt;
    color: #333;
    line-height: 1.5;
    display: block;
    overflow: hidden;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* ── ブレーク行 ── */
  .pt-break-asa td  { height: 14pt !important; background: #f3f7ef !important; }
  .pt-break-naka td { height: 10pt !important; background: #eeeceb !important; }
  .pt-break-hiru1 td { height: 10pt !important; background: #f0f0f0 !important; }

  #pt-notice-label {

    font-size: 8pt;
    line-height: 1.6;
    color: #000;
    white-space: pre-wrap;
    overflow: hidden;
  }

  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     編集画面（#app）
════════════════════════════════════════════════ -->
<div id="app">

  <!-- ─── トップバー ─── -->
  <div id="topbar">
    <span class="app-logo">📅 サクサク週案</span>
    <div class="sep"></div>
    <div class="top-info" id="class-badge">
      <span id="class-display">（未設定）</span>
      <span class="edit-link" onclick="openSettings()">⚙ 設定</span>
    </div>
    <div class="spacer"></div>
    <button class="tb-btn" onclick="copyPrev()">🔄 前週コピー</button>
    <button class="tb-btn primary" onclick="doPrint()">🖨 PDF出力</button>
  </div>

  <!-- ─── タブバー ─── -->
  <div id="tabbar">
    <button class="tab active" onclick="switchTab('main')">📅 週案</button>
    <button class="tab"        onclick="switchTab('jisu')">📊 時数管理</button>
  </div>

  <!-- ═══ 週案ページ ═══ -->
  <div class="page active" id="main-page">

    <!-- 左 -->
    <div class="pane-left">

      <!-- 週ナビ -->
      <div id="week-nav">
        <button class="wn-arrow" onclick="shiftWeek(-1)">‹</button>
        <div id="wn-center">
          <div id="wn-title">— 週案</div>
          <div id="wn-range">— 〜 —</div>
          <div class="wn-dots" id="wn-dots"></div>
        </div>
        <button class="wn-arrow" onclick="shiftWeek(1)">›</button>
        <div class="wn-controls">
          <label style="font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;">
            <input type="checkbox" id="sat-chk" onchange="toggleSat()"> 土曜授業
          </label>
          <label style="font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px;">
            <input type="checkbox" id="empty-chk" onchange="toggleEmpty()"> 空欄強調
          </label>
        </div>
      </div>

      <!-- グリッド -->
      <div class="table-scroll" id="table-wrap">
        <table id="grid"><colgroup id="colgroup"></colgroup><thead id="thead"></thead><tbody id="tbody"></tbody></table>
      </div>

      <!-- おしらせ欄 -->
      <div id="notice-area">
        <div id="notice-label">📢 おしらせ・連絡事項</div>
        <div id="notice-pad" contenteditable="true" oninput="saveNotice()"></div>
      </div>
    </div>

    <!-- 右：サイドパネル -->
    <div class="pane-right">
      <div class="panel-card">
        <h3>🎨 教科パレット</h3>
        <div class="palette-grid" id="palette"></div>
        <div id="hist-area">
          <div class="hist-label" id="hist-label">マスを選ぶと履歴が出ます</div>
          <div id="hist-chips"></div>
        </div>
      </div>
      <div class="panel-card">
        <h3>📊 週時数</h3>
        <table class="jisu-mini">
          <thead><tr><th>教科</th><th>今週</th><th>累計</th><th>残り</th><th>計画</th></tr></thead>
          <tbody id="jisu-mini-body"></tbody>
        </table>
      </div>
      <div class="panel-card">
        <h3>📌 ツール</h3>
        <button class="tool-btn" onclick="saveTemplate()">📥 基本時間割として登録</button>
        <button class="tool-btn" onclick="loadTemplate()">📤 基本時間割を展開</button>
        <button class="tool-btn" onclick="exportData()">⬇️ データを保存（JSON）</button>
        <button class="tool-btn" onclick="document.getElementById('import-inp').click()">⬆️ データを復元</button>
        <input type="file" id="import-inp" style="display:none" accept=".json" onchange="importData(event)">
        <div id="drop-zone" onclick="document.getElementById('import-inp').click()">📂 JSONをドロップ</div>
      </div>
    </div>
  </div>

  <!-- ═══ 時数管理ページ ═══ -->
  <div class="page" id="jisu-page">
    <h2>📊 時数管理</h2>
    <div id="jisu-grid"></div>
  </div>

</div><!-- /#app -->

<!-- ═══════════════════════════════════════════════
     印刷専用エリア（#print-area）
     ── 編集UIとは完全分離。buildPrint()でデータを流し込む ──
════════════════════════════════════════════════ -->
<div id="print-area">
  <!--
    テーブル構成：
    行　: タイトル / ヘッダー / 朝 / 1〜6校時 / 中休み / 昼① / 昼② / 持ち物
    列　: 時間ラベル列 + 月〜金（または月〜土）
    各セルにid="p-{row}_{day}" を付与してbuildPrint()からデータを流し込む
  -->
  <table id="print-table">
    <colgroup id="pt-colgroup"></colgroup>
    <thead id="pt-thead"></thead>
    <tbody id="pt-tbody"></tbody>
  </table>
  <div id="pt-notice-area">
    <div id="pt-notice-label">おしらせ・連絡事項</div>
    <div id="pt-notice-pad"></div>
  </div>
</div>

<!-- ─── 設定モーダル ─── -->
<div id="modal-overlay">
  <div id="modal-box">
    <h2>⚙ 基本設定</h2>
    <div class="modal-field">
      <label>学年</label>
      <select id="cfg-grade">
        <option value="1">1年</option><option value="2">2年</option>
        <option value="3">3年</option><option value="4">4年</option>
        <option value="5">5年</option><option value="6">6年</option>
      </select>
    </div>
    <div class="modal-field">
      <label>組</label>
      <input type="text" id="cfg-class" placeholder="例：1組" maxlength="6">
    </div>
    <div class="modal-field">
      <label>担任名</label>
      <input type="text" id="cfg-name" placeholder="例：山田太郎" maxlength="20">
    </div>
    <div class="modal-field">
      <label>学年の標準時数（参考用・自動入力）</label>
      <div id="cfg-std-note" style="font-size:11px;color:var(--sub);margin-top:3px;">学年を選ぶと時数ページの計画値に反映できます</div>
    </div>
    <div class="modal-actions">
      <button class="tb-btn" onclick="closeSettings()">キャンセル</button>
      <button class="tb-btn primary" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════
   定数
═══════════════════════════════════════════════════ */
const BASE_DAYS = ["月","火","水","木","金"];

const ROWS = [
  { id:"朝",   type:"break", cls:"row-asa",   ph:"朝の活動・スピーチなど" },
  { id:"1",    type:"class" },
  { id:"2",    type:"class" },
  { id:"中",   type:"break", cls:"row-naka",  ph:"中休み" },
  { id:"3",    type:"class" },
  { id:"4",    type:"class" },
  { id:"昼①", type:"break", cls:"row-hiru",  ph:"給食" },
  { id:"昼②", type:"break", cls:"row-hiru",  ph:"昼休み" },
  { id:"5",    type:"class" },
  { id:"6",    type:"class" },
  { id:"持物", type:"break", cls:"row-items", ph:"持ち物・連絡事項" },
];

const BREAK_IDS = new Set(ROWS.filter(r=>r.type==="break").map(r=>r.id));

const SUBJECTS = [
  { name:"国語",  hira:"こくご",    color:"var(--c-kokugo)",    cnt:"国語"   },
  { name:"書写",  hira:"しょしゃ",  color:"var(--c-syasya)",    cnt:"国語"   },
  { name:"算数",  hira:"さんすう",  color:"var(--c-sansu)",     cnt:"算数"   },
  { name:"生活",  hira:"せいかつ",  color:"var(--c-seikatsu)",  cnt:"生活"   },
  { name:"理科",  hira:"りか",      color:"var(--c-rika)",      cnt:"理科"   },
  { name:"社会",  hira:"しゃかい",  color:"var(--c-shakai)",    cnt:"社会"   },
  { name:"音楽",  hira:"おんがく",  color:"var(--c-ongaku)",    cnt:"音楽"   },
  { name:"図工",  hira:"ずこう",    color:"var(--c-zukou)",     cnt:"図工"   },
  { name:"家庭科",hira:"かていか",  color:"var(--c-katei)",     cnt:"家庭科" },
  { name:"体育",  hira:"たいいく",  color:"var(--c-taiiku)",    cnt:"体育"   },
  { name:"道徳",  hira:"どうとく",  color:"var(--c-dotoku)",    cnt:"道徳"   },
  { name:"外国語",hira:"がいこくご",color:"var(--c-gaikokugo)", cnt:"外国語" },
  { name:"総合",  hira:"そうごう",  color:"var(--c-sogo)",      cnt:"総合"   },
  { name:"学活",  hira:"がっかつ",  color:"var(--c-gakkatsu)",  cnt:"学活"   },
  { name:"行事",  hira:"ぎょうじ",  color:"var(--c-gyoji)",     cnt:"行事"   },
  { name:"委員会",hira:"いいんかい",color:"var(--c-iinkai)",    cnt:"委員会" },
  { name:"クラブ",hira:"くらぶ",    color:"var(--c-club)",      cnt:"クラブ" },
  { name:"欠課",  hira:"けっか",    color:"var(--c-kekka)",     cnt:"欠課"   },
];

const SUBJ_ORDER = SUBJECTS.map(s=>s.cnt).filter((v,i,a)=>a.indexOf(v)===i);

// 教科名 → 印刷用背景色（16進数）
const SUBJ_PRINT_COLOR = {
  "国語":  "#fef3c7",
  "書写":  "#d1fae5",
  "算数":  "#dbeafe",
  "生活":  "#fef9c3",
  "理科":  "#ccfbf1",
  "社会":  "#fee2e2",
  "音楽":  "#ede9fe",
  "図工":  "#ffedd5",
  "家庭科":"#bfdbfe",
  "体育":  "#fde68a",
  "道徳":  "#cffafe",
  "外国語":"#dcfce7",
  "総合":  "#fce7f3",
  "学活":  "#e0e7ff",
  "行事":  "#fff7ed",
  "委員会":"#a5f3fc",
  "クラブ":"#fecdd3",
  "欠課":  "#e5e7eb",
};

const STD_HOURS = {
  1:{ 国語:306, 算数:136, 生活:102, 音楽:68, 図工:68, 体育:102, 道徳:34, 学活:34 },
  2:{ 国語:315, 算数:175, 生活:105, 音楽:70, 図工:70, 体育:105, 道徳:35, 学活:35 },
  3:{ 国語:245, 社会:70,  算数:175, 理科:90,  音楽:60, 図工:60, 体育:105, 道徳:35, 外国語:35, 総合:70, 学活:35 },
  4:{ 国語:245, 社会:90,  算数:175, 理科:105, 音楽:60, 図工:60, 体育:105, 道徳:35, 外国語:35, 総合:70, 学活:35 },
  5:{ 国語:175, 社会:105, 算数:175, 理科:105, 音楽:50, 図工:50, 家庭科:60, 体育:90, 道徳:35, 外国語:70, 総合:70, 学活:35 },
  6:{ 国語:175, 社会:105, 算数:175, 理科:105, 音楽:50, 図工:50, 家庭科:60, 体育:90, 道徳:35, 外国語:70, 総合:70, 学活:35 },
};

/* ═══════════════════════════════════════════════════
   ストア
═══════════════════════════════════════════════════ */
let store = JSON.parse(localStorage.getItem("sakusaku2") || "{}");
let currentMonday = null;
let activeCell    = null;

function save() { localStorage.setItem("sakusaku2", JSON.stringify(store)); }

function weekData(key) {
  if (!key) return null;
  if (!store[key]) store[key] = { cells:{}, notice:"", hasSat:false, dayFlags:{}, dayLabels:{} };
  const w = store[key];
  if (!w.dayFlags)  w.dayFlags  = {};
  if (!w.dayLabels) w.dayLabels = {};
  return w;
}
function cfg() {
  if (!store._cfg) store._cfg = { grade:3, cls:"1組", name:"" };
  return store._cfg;
}
function jisu() {
  if (!store._jisu) store._jisu = {};
  return store._jisu;
}

/* ═══════════════════════════════════════════════════
   初期化
═══════════════════════════════════════════════════ */
window.onload = () => {
  const c = cfg();
  document.getElementById("cfg-grade").value = c.grade || 3;
  document.getElementById("cfg-class").value = c.cls   || "";
  document.getElementById("cfg-name").value  = c.name  || "";
  updateClassBadge();
  if (!c.cls) openSettings();

  const today = new Date();
  const diff  = today.getDay() === 0 ? -6 : 1 - today.getDay();
  const mon   = new Date(today); mon.setDate(today.getDate() + diff);
  currentMonday = mon.toISOString().slice(0, 10);

  renderPalette();
  renderWeek();
  setupDrop();
};

/* ═══════════════════════════════════════════════════
   設定
═══════════════════════════════════════════════════ */
function openSettings() {
  const c = cfg();
  document.getElementById("cfg-grade").value = c.grade || 3;
  document.getElementById("cfg-class").value = c.cls   || "";
  document.getElementById("cfg-name").value  = c.name  || "";
  document.getElementById("modal-overlay").classList.add("open");
}
function closeSettings() {
  document.getElementById("modal-overlay").classList.remove("open");
}
function saveSettings() {
  const c = cfg();
  c.grade = parseInt(document.getElementById("cfg-grade").value);
  c.cls   = document.getElementById("cfg-class").value.trim();
  c.name  = document.getElementById("cfg-name").value.trim();
  store._cfg = c;
  save();
  updateClassBadge();
  closeSettings();
  const std = STD_HOURS[c.grade] || {};
  const j   = jisu();
  let updated = false;
  for (const [subj, h] of Object.entries(std)) {
    if (!j[subj]) { j[subj] = { plan: h }; updated = true; }
  }
  if (updated) { save(); toast("標準時数を時数管理に反映しました"); }
  else { toast("設定を保存しました"); }
  renderWeek();
}
function updateClassBadge() {
  const c = cfg();
  const txt = c.cls
    ? `${c.grade}年${c.cls}${c.name ? " · " + c.name + " 先生" : ""}`
    : "（未設定）";
  document.getElementById("class-display").textContent = txt;
}

/* ═══════════════════════════════════════════════════
   タブ
═══════════════════════════════════════════════════ */
function switchTab(id) {
  document.querySelectorAll(".tab").forEach((t,i) =>
    t.classList.toggle("active", (i===0&&id==="main")||(i===1&&id==="jisu")));
  document.getElementById("main-page").classList.toggle("active", id==="main");
  document.getElementById("jisu-page").classList.toggle("active", id==="jisu");
  if (id === "jisu") renderJisuPage();
}

/* ═══════════════════════════════════════════════════
   週ナビ
═══════════════════════════════════════════════════ */
function shiftWeek(dir) {
  const d = new Date(currentMonday);
  d.setDate(d.getDate() + dir * 7);
  currentMonday = d.toISOString().slice(0, 10);
  renderWeek();
}
function toggleSat() {
  weekData(currentMonday).hasSat = document.getElementById("sat-chk").checked;
  save(); renderWeek();
}
function toggleEmpty() {
  const on = document.getElementById("empty-chk").checked;
  document.querySelectorAll("td.class-cell").forEach(td => {
    const sub = td.querySelector(".cell-sub");
    td.classList.toggle("cell-empty", on && sub && sub.innerText.trim() === "");
  });
}

function updateNav() {
  const w   = store[currentMonday] || {};
  const c   = cfg();
  const mon = new Date(currentMonday);
  const fri = new Date(currentMonday); fri.setDate(fri.getDate() + (w.hasSat ? 5 : 4));
  const monthNum = mon.getMonth() + 1;
  const weekNum  = Math.ceil(mon.getDate() / 7);
  const dayName  = ["日","月","火","水","木","金","土"];

  document.getElementById("wn-title").textContent =
    `${c.grade}年${c.cls || "—組"} ${monthNum}月第${weekNum}週案`;
  document.getElementById("wn-range").textContent =
    `${monthNum}/${mon.getDate()}(${dayName[mon.getDay()]}) 〜 ${fri.getMonth()+1}/${fri.getDate()}(${dayName[fri.getDay()]})`;

  const dots = document.getElementById("wn-dots"); dots.innerHTML = "";
  for (let i = -3; i <= 3; i++) {
    const d = new Date(currentMonday); d.setDate(d.getDate() + i * 7);
    const iso = d.toISOString().slice(0, 10);
    const dot = document.createElement("div");
    const hasData = store[iso] && Object.values(store[iso].cells || {}).some(c => c.sub || c.txt);
    dot.className = "wn-dot" + (i === 0 ? " cur" : "") + (hasData && i !== 0 ? " has" : "");
    dot.title = iso;
    dot.onclick = (() => { const k = iso; return () => { currentMonday = k; renderWeek(); }; })();
    dots.appendChild(dot);
  }
}

/* ═══════════════════════════════════════════════════
   フラグ（祝日↔振休↔なし）
═══════════════════════════════════════════════════ */
function cycleFlag(day) {
  const w   = weekData(currentMonday);
  const cur = w.dayFlags[day] || null;
  if      (!cur)             w.dayFlags[day] = "holiday";
  else if (cur === "holiday") w.dayFlags[day] = "furikyu";
  else                        delete w.dayFlags[day];
  save(); renderWeek(); toast("保存しました", 1200);
}

/* ═══════════════════════════════════════════════════
   編集テーブル描画
═══════════════════════════════════════════════════ */
function renderWeek() {
  const w    = weekData(currentMonday);
  const days = w.hasSat ? [...BASE_DAYS, "土"] : [...BASE_DAYS];

  document.getElementById("sat-chk").checked = w.hasSat;
  document.getElementById("notice-pad").innerHTML = w.notice || "";
  updateNav();

  const cg = document.getElementById("colgroup");
  cg.innerHTML = `<col class="col-time">` + days.map(() => `<col>`).join("");

  const dayNames = ["日","月","火","水","木","金","土"];
  let thHTML = `<tr><th class="time-cell" style="background:var(--surface2);border-bottom:2px solid var(--border-dk);position:sticky;top:0;z-index:11;"></th>`;
  days.forEach((d, i) => {
    const dt   = new Date(currentMonday); dt.setDate(dt.getDate() + i);
    const flag = w.dayFlags[d] || null;
    const cls  = flag === "holiday" ? "col-holiday" : flag === "furikyu" ? "col-furikyu" : "";
    const badge = flag === "holiday"
      ? `<span class="th-flag h" onclick="cycleFlag('${d}')" title="クリックで変更">祝</span>`
      : flag === "furikyu"
      ? `<span class="th-flag f" onclick="cycleFlag('${d}')" title="クリックで変更">振</span>`
      : `<span class="th-flag n" onclick="cycleFlag('${d}')" title="クリックで祝日設定">＋</span>`;
    thHTML += `<th class="${cls}">
      ${d}曜${badge}
      <span class="th-date">${dt.getMonth()+1}/${dt.getDate()}</span>
    </th>`;
  });
  thHTML += "</tr>";
  document.getElementById("thead").innerHTML = thHTML;

  let bodyHTML = "";
  ROWS.forEach(row => {
    const isBreak = row.type === "break";
    const rowCls  = isBreak ? `break-row ${row.cls || ""}` : "class-row";
    bodyHTML += `<tr class="${rowCls}"><td class="time-cell">${row.id}</td>`;
    days.forEach(d => {
      const key  = `${row.id}_${d}`;
      const cell = w.cells[key] || { sub: "", txt: "" };
      const flag = w.dayFlags[d] || null;

      if (flag === "holiday" || flag === "furikyu") {
        bodyHTML += `<td class="data-cell ${flag==="holiday"?"cell-holiday":"cell-furikyu"}"></td>`;
        return;
      }

      if (isBreak) {
        bodyHTML += `<td class="data-cell break-cell" data-key="${key}" data-type="break">
          <div class="cell-txt" contenteditable="true" data-ph="${row.ph}"
            onfocus="onFocus(this)" onblur="onBlur('${key}')"
            oninput="onInput('${key}')">${escHtml(cell.txt || cell.sub || "")}</div>
        </td>`;
      } else {
        const isKekka = cell.sub && (cell.sub.includes("欠課") || cell.sub.includes("けっか"));
        const kCls    = isKekka ? " cell-kekka" : "";
        bodyHTML += `<td class="data-cell class-cell${kCls}" data-key="${key}" data-type="class">
          <div class="cell-sub" contenteditable="true" data-ph="教科"
            onfocus="onFocus(this)" onblur="onBlur('${key}')"
            oninput="onInput('${key}')"
            onkeydown="onSubKey(event,'${key}')">${escHtml(cell.sub)}</div>
          <div class="cell-txt" contenteditable="true" data-ph="単元・内容"
            onfocus="onFocus(this)" onblur="onBlur('${key}')"
            oninput="onInput('${key}')"
            onkeydown="onTxtKey(event,'${key}')">${escHtml(cell.txt)}</div>
        </td>`;
      }
    });
    bodyHTML += "</tr>";
  });
  document.getElementById("tbody").innerHTML = bodyHTML;
  document.querySelectorAll("td.class-cell").forEach(td => applyColor(td));
  renderDayLabels(w, days);
  renderJisuMini();
}

function escHtml(str) {
  return (str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

/* ─── 祝日ラベル（編集画面用） ─── */
function renderDayLabels(w, days) {
  document.querySelectorAll(".day-label-box").forEach(e => e.remove());
  const wrap  = document.getElementById("table-wrap");
  const table = document.getElementById("grid");
  const wr    = wrap.getBoundingClientRect();
  const theadRow = table.querySelector("thead tr");

  days.forEach((d, ci) => {
    const flag = w.dayFlags[d];
    if (!flag) return;
    const th  = theadRow.children[ci + 1];
    if (!th) return;
    const thr  = th.getBoundingClientRect();
    const tbr  = table.getBoundingClientRect();
    const left = thr.left - wr.left + wrap.scrollLeft;
    const top  = thr.bottom - wr.top + wrap.scrollTop;
    const h    = tbr.bottom - wr.top + wrap.scrollTop - top;

    const label = w.dayLabels[d] || (flag === "holiday" ? "祝日" : "振替休日");
    const box   = document.createElement("div");
    box.className = "day-label-box";
    box.style.cssText = `left:${left+4}px;width:${thr.width-8}px;top:${top+4}px;height:${h-8}px;position:absolute;`;

    const inner = document.createElement("div");
    inner.className = "day-label-inner" + (flag === "furikyu" ? " furi" : "");
    inner.contentEditable = "true";
    inner.textContent     = label;
    inner.style.outline   = "none";
    inner.addEventListener("input", () => { w.dayLabels[d] = inner.textContent.trim(); save(); });
    inner.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); inner.blur(); } });
    box.appendChild(inner);
    wrap.style.position = "relative";
    wrap.appendChild(box);
  });
}

window.addEventListener("resize", () => {
  if (!currentMonday || !store[currentMonday]) return;
  const w = store[currentMonday];
  renderDayLabels(w, w.hasSat ? [...BASE_DAYS, "土"] : [...BASE_DAYS]);
});

/* ─── セル操作 ─── */
function onFocus(el) {
  document.querySelectorAll(".active-cell").forEach(e => e.classList.remove("active-cell"));
  const td = el.closest("td");
  if (!td) return;
  td.classList.add("active-cell");
  activeCell = td;
  renderHist();
}

function onInput(key) {
  const w  = store[currentMonday];
  const td = document.querySelector(`td[data-key="${key}"]`);
  if (!td || !w) return;
  const sub = td.querySelector(".cell-sub");
  const txt = td.querySelector(".cell-txt");
  w.cells[key] = { sub: sub ? sub.innerText : "", txt: txt ? txt.innerText : "" };
  save();
  if (td.dataset.type === "class") { applyColor(td); renderJisuMini(); }
  toast("✓", 800);
}

function onBlur(key) {
  const td = document.querySelector(`td[data-key="${key}"]`);
  if (!td || td.dataset.type !== "class") return;
  const sub = (td.querySelector(".cell-sub")?.innerText||"").trim();
  const txt = (td.querySelector(".cell-txt")?.innerText||"").trim();
  if (!sub || !txt) return;
  if (!store._hist)      store._hist = {};
  if (!store._hist[sub]) store._hist[sub] = [];
  let h = store._hist[sub].filter(x => x !== txt);
  h.unshift(txt);
  if (h.length > 20) h.pop();
  store._hist[sub] = h;
  save();
}

function onSubKey(e, key) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    const td  = document.querySelector(`td[data-key="${key}"]`);
    const txt = td?.querySelector(".cell-txt");
    if (txt) txt.focus();
  }
}

function onTxtKey(e, key) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    const td  = document.querySelector(`td[data-key="${key}"]`);
    const tr  = td?.closest("tr");
    const ci  = td ? Array.from(tr.children).indexOf(td) : -1;
    if (ci < 0) return;
    let nx = tr.nextElementSibling;
    while (nx) {
      const c = nx.children[ci];
      if (c && c.classList.contains("class-cell")) {
        c.querySelector(".cell-sub")?.focus(); break;
      }
      nx = nx.nextElementSibling;
    }
  }
}

function applyColor(td) {
  const sub = td.querySelector(".cell-sub")?.innerText || "";
  if (td.classList.contains("cell-holiday") || td.classList.contains("cell-furikyu")) return;
  const isK = sub.includes("欠課") || sub.includes("けっか");
  td.classList.toggle("cell-kekka", isK);
  td.style.backgroundColor = "";
  if (isK) return;
  for (const s of SUBJECTS) {
    if (sub.includes(s.name) || sub.includes(s.hira)) {
      td.style.backgroundColor = s.color; break;
    }
  }
}

/* ─── パレット ─── */
function renderPalette() {
  const p = document.getElementById("palette");
  p.innerHTML = SUBJECTS.map(s => {
    const isK = s.name === "欠課";
    const bg  = isK
      ? "repeating-linear-gradient(135deg,#ddd,#ddd 5px,#bbb 5px,#bbb 7px)"
      : s.color;
    return `<div class="pal-btn" style="background:${bg};" onclick="insertSubject('${s.name}')">${s.name}</div>`;
  }).join("") + `<div class="pal-btn" style="background:#eee;" onclick="insertSubject('')">消去</div>`;
}

function insertSubject(name) {
  if (!activeCell)                        { toast("マスを選んでください"); return; }
  if (activeCell.dataset.type === "break"){ toast("ブレーク行には直接入力を"); return; }
  const sub = activeCell.querySelector(".cell-sub");
  const txt = activeCell.querySelector(".cell-txt");
  if (sub) sub.innerText = name;
  if (txt && !name) txt.innerText = "";
  onInput(activeCell.dataset.key);
  if (name && txt) txt.focus();
  renderHist();
}

/* ─── 履歴サジェスト ─── */
function renderHist() {
  const label = document.getElementById("hist-label");
  const chips = document.getElementById("hist-chips");
  if (!activeCell || activeCell.dataset.type === "break") {
    label.textContent = "マスを選ぶと履歴が出ます";
    chips.innerHTML = "";
    return;
  }
  const sub = (activeCell.querySelector(".cell-sub")?.innerText || "").trim();
  const h   = store._hist?.[sub];
  if (!h?.length) {
    label.textContent = sub ? `「${sub}」の履歴なし` : "教科を入力してください";
    chips.innerHTML = "";
    return;
  }
  label.textContent = `💡 「${sub}」の履歴`;
  chips.innerHTML = h.slice(0, 10).map(t => {
    const s = t.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
    return `<div class="hist-chip" onclick="insertHist('${sub}','${s}')">${t.length > 16 ? t.slice(0,16)+"…" : t}</div>`;
  }).join("");
}

function insertHist(sub, txt) {
  if (!activeCell) return;
  const s = activeCell.querySelector(".cell-sub");
  const t = activeCell.querySelector(".cell-txt");
  if (s) s.innerText = sub;
  if (t) t.innerText = txt;
  onInput(activeCell.dataset.key);
}

/* ═══════════════════════════════════════════════════
   時数
═══════════════════════════════════════════════════ */
function countWeek(dateKey) {
  const w = store[dateKey];
  if (!w?.cells) return {};
  const cnt = {};
  for (const [key, cell] of Object.entries(w.cells)) {
    const rid = key.split("_")[0];
    if (BREAK_IDS.has(rid)) continue;
    const sub = cell.sub;
    if (!sub) continue;
    const s = SUBJECTS.find(x => sub.includes(x.name) || sub.includes(x.hira));
    if (s) cnt[s.cnt] = (cnt[s.cnt] || 0) + 1;
  }
  return cnt;
}

function countAll() {
  const total = {};
  for (const k in store) {
    if (k.startsWith("_")) continue;
    const wc = countWeek(k);
    for (const [s, n] of Object.entries(wc)) total[s] = (total[s] || 0) + n;
  }
  return total;
}

function setPlan(subj, val) {
  const j = jisu();
  if (!j[subj]) j[subj] = { plan: 0 };
  j[subj].plan = parseInt(val) || 0;
  save(); renderJisuMini(); renderJisuPage();
}

function renderJisuMini() {
  const body  = document.getElementById("jisu-mini-body");
  if (!body) return;
  const thisW = countWeek(currentMonday);
  const allW  = countAll();
  const j     = jisu();
  const used  = SUBJ_ORDER.filter(s => thisW[s] || allW[s] || j[s]?.plan);

  if (!used.length) {
    body.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#bbb;font-size:11px;padding:8px;">教科を入力すると集計されます</td></tr>`;
    return;
  }
  body.innerHTML = used.map(s => {
    const tw  = thisW[s] || 0;
    const all = allW[s]  || 0;
    const pl  = j[s]?.plan || 0;
    const rem = pl > 0 ? pl - all : null;
    const warn = rem !== null && rem < 0;
    return `<tr>
      <td>${s}</td>
      <td class="num">${tw}</td>
      <td class="num">${all}</td>
      <td class="num${warn?" warn":""}">${rem !== null ? (warn ? "超" : "あと"+rem) : "—"}</td>
      <td><input class="plan-inp" type="number" min="0" value="${pl}" onchange="setPlan('${s}',this.value)"></td>
    </tr>`;
  }).join("");
}

function renderJisuPage() {
  const grid  = document.getElementById("jisu-grid");
  if (!grid) return;
  const allW  = countAll();
  const j     = jisu();
  const used  = SUBJ_ORDER.filter(s => allW[s] || j[s]?.plan);

  if (!used.length) {
    grid.innerHTML = `<div style="color:#aaa;font-size:13px;">週案に教科を入力すると自動集計されます</div>`;
    return;
  }
  grid.innerHTML = used.map(s => {
    const all  = allW[s]  || 0;
    const pl   = j[s]?.plan || 0;
    const rem  = pl > 0 ? pl - all : null;
    const pct  = pl > 0 ? Math.min(100, Math.round(all / pl * 100)) : 0;
    const subj = SUBJECTS.find(x => x.cnt === s) || { color: "#eee" };
    const warn = rem !== null && rem < 0;
    return `<div class="jisu-card">
      <div class="jisu-card-head" style="background:${subj.color};">${s}</div>
      <div class="jisu-card-body">
        <div class="jisu-row"><span>計画</span>
          <span><input class="plan-inp" type="number" min="0" value="${pl}" onchange="setPlan('${s}',this.value)"> 時間</span>
        </div>
        <div class="jisu-row"><span>累計</span><span style="font-weight:700;">${all} 時間</span></div>
        <div class="jisu-row"><span>残り</span>
          <span style="font-weight:700;color:${warn?"var(--red)":"var(--text)"};">
            ${rem !== null ? (warn ? "⚠ 超過 "+Math.abs(rem)+"h" : "あと "+rem+" 時間") : "計画未設定"}
          </span>
        </div>
        <div class="jisu-bar-bg">
          <div class="jisu-bar-fill" style="width:${pct}%;background:${subj.color};filter:saturate(1.8);"></div>
        </div>
        <div style="text-align:right;font-size:10px;color:var(--sub);">${pct}%</div>
      </div>
    </div>`;
  }).join("");
}

/* ═══════════════════════════════════════════════════
   おしらせ
═══════════════════════════════════════════════════ */
function saveNotice() {
  const w = weekData(currentMonday);
  if (!w) return;
  let h = document.getElementById("notice-pad").innerHTML;
  h = h.replace(/<div>/g, "<br>").replace(/<\/div>/g, "");
  w.notice = h;
  save();
}

/* ═══════════════════════════════════════════════════
   前週コピー・テンプレート
═══════════════════════════════════════════════════ */
function copyPrev() {
  const prev = new Date(currentMonday); prev.setDate(prev.getDate() - 7);
  const pk   = prev.toISOString().slice(0, 10);
  if (!store[pk] || !Object.keys(store[pk].cells || {}).length) { toast("先週のデータがありません"); return; }
  if (!confirm("先週の時間割をコピーしますか？")) return;
  weekData(currentMonday).cells  = JSON.parse(JSON.stringify(store[pk].cells));
  weekData(currentMonday).hasSat = store[pk].hasSat;
  save(); renderWeek(); toast("コピーしました");
}

function saveTemplate() {
  if (!confirm("現在の時間割を基本として登録しますか？")) return;
  store._tpl = JSON.parse(JSON.stringify(store[currentMonday].cells));
  save(); toast("登録しました");
}

function loadTemplate() {
  if (!store._tpl) { toast("基本時間割がありません"); return; }
  if (!confirm("基本時間割を展開しますか？")) return;
  weekData(currentMonday).cells = JSON.parse(JSON.stringify(store._tpl));
  save(); renderWeek(); toast("展開しました");
}

/* ═══════════════════════════════════════════════════
   保存・復元
═══════════════════════════════════════════════════ */
function exportData() {
  const blob = new Blob([JSON.stringify(store, null, 2)], { type: "application/json" });
  const a    = document.createElement("a");
  a.href     = URL.createObjectURL(blob);
  a.download = `sakusaku_${currentMonday || "data"}.json`;
  a.click();
}

function importData(e) {
  const f = e.target.files[0]; if (!f) return;
  loadFile(f);
}

function loadFile(file) {
  const r = new FileReader();
  r.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!confirm("データを復元しますか？（現在のデータは上書きされます）")) return;
      store = data; save();
      toast("復元しました");
      setTimeout(() => location.reload(), 700);
    } catch { toast("読み込みに失敗しました"); }
  };
  r.readAsText(file);
}

function setupDrop() {
  const dz = document.getElementById("drop-zone");
  dz.addEventListener("dragover",  e => { e.preventDefault(); dz.classList.add("over"); });
  dz.addEventListener("dragleave", () => dz.classList.remove("over"));
  dz.addEventListener("drop", e => {
    e.preventDefault(); dz.classList.remove("over");
    const f = e.dataTransfer.files[0]; if (f) loadFile(f);
  });
}

/* ═══════════════════════════════════════════════════
   ★★ 印刷専用DOM構築 + PDF出力 ★★
   編集画面のデータを印刷用DOMに流し込んでから window.print() を呼ぶ。
   ブラウザの「PDFとして保存」でA4縦に完璧に出力される。
═══════════════════════════════════════════════════ */

/**
 * 教科名から印刷用の背景色（16進数）を返す。
 * 欠課のときはグレーのパターン用クラスを付与するため null を返す。
 */
function getPrintBgColor(sub) {
  if (!sub) return null;
  if (sub.includes("欠課") || sub.includes("けっか")) return null; // pt-kekkaクラスで処理
  for (const s of SUBJECTS) {
    if (sub.includes(s.name) || sub.includes(s.hira)) {
      return SUBJ_PRINT_COLOR[s.cnt] || null;
    }
  }
  return null;
}

/**
 * buildPrint(w, days, c)
 * 印刷専用テーブルを完全に再構築する。
 * ─ colgroup / thead / tbody / noticepad に直接DOMを書き込む。
 * ─ セルに inline style で背景色を指定（印刷時の色再現のため）。
 */
function buildPrint(w, days, c) {
  const mon      = new Date(currentMonday);
  const dayNames = ["日","月","火","水","木","金","土"];
  const numDays  = days.length; // 5 or 6

  // ── colgroup ──────────────────────────────────────
  // 時間列: 14pt固定  |  日付列: 残りを均等分割
  // mmで書くと印刷時にブラウザ依存が出るのでpt指定
  const dateCols = `<col style="width:14pt;">` +
    days.map(() => `<col style="width:auto;">`).join("");
  document.getElementById("pt-colgroup").innerHTML = dateCols;

  // ── タイトル行 ────────────────────────────────────
  const titleColspan = numDays + 1; // 時間列 + 日付列
  const titleTh = `<tr class="pt-title-row">
    <th colspan="${titleColspan}" style="font-size:18pt;font-weight:900;text-align:center;padding-bottom:4pt;border:none;letter-spacing:.1em;">
      ${c.grade}年${c.cls || "—組"}　学習予定表
    </th>
  </tr>`;

  // ── ヘッダー行（曜日・日付） ─────────────────────
  let headerRow = `<tr class="pt-header-row"><th class="pt-time-col" style="background:#eeebe5;"></th>`;
  days.forEach((d, i) => {
    const dt   = new Date(currentMonday); dt.setDate(dt.getDate() + i);
    const flag = w.dayFlags[d] || null;
    const cls  = flag === "holiday" ? "th-holiday-col" : flag === "furikyu" ? "th-furikyu-col" : "";
    const bg   = flag === "holiday" ? "#fff0f0"         : flag === "furikyu" ? "#eff2ff"        : "#f0ede8";
    const color= flag === "holiday" ? "#900"            : flag === "furikyu" ? "#226"           : "#000";
    headerRow += `<th class="${cls}" style="background:${bg};color:${color};text-align:center;font-size:9pt;font-weight:900;height:16pt;vertical-align:middle;padding:1pt 2pt;border-bottom:1.5pt solid #555;">
      ${d}曜日
      <span class="pt-header-date" style="font-size:7pt;font-weight:500;color:${flag?"inherit":"#555"};display:block;margin-top:1pt;">
        ${dt.getMonth()+1}月${dt.getDate()}日(${dayNames[dt.getDay()]})
      </span>
    </th>`;
  });
  headerRow += "</tr>";

  document.getElementById("pt-thead").innerHTML = titleTh + headerRow;

  // ── tbody ─────────────────────────────────────────
  // 印刷用の行定義
  const PRINT_ROWS = [
    { id:"朝",   type:"break", trCls:"pt-break-asa",   label:"朝" },
    { id:"1",    type:"class", label:"1" },
    { id:"2",    type:"class", label:"2" },
    { id:"中",   type:"break", trCls:"pt-break-naka",  label:"中" },
    { id:"3",    type:"class", label:"3" },
    { id:"4",    type:"class", label:"4" },
    { id:"昼①", type:"break", trCls:"pt-break-hiru1", label:"昼①" },
    { id:"昼②", type:"break", trCls:"pt-break-hiru2", label:"昼②" },
    { id:"5",    type:"class", label:"5" },
    { id:"6",    type:"class", label:"6" },
    { id:"持物", type:"break", trCls:"pt-break-items", label:"持ち物" },
  ];

  let tbody = "";
  PRINT_ROWS.forEach(row => {
    const isBreak  = row.type === "break";
    const trCls    = isBreak ? row.trCls : "pt-class-row";
    // 時間列の縦書きラベル
    const timeCell = `<td class="pt-time-col" style="background:#eeebe5;writing-mode:vertical-rl;text-align:center;vertical-align:middle;font-size:7pt;font-weight:900;color:#333;border-right:1.5pt solid #888;padding:0;">${row.label}</td>`;

    tbody += `<tr class="${trCls}">` + timeCell;

    days.forEach(d => {
      const key  = `${row.id}_${d}`;
      const cell = w.cells[key] || { sub: "", txt: "" };
      const flag = w.dayFlags[d] || null;

      // 祝日・振休
      if (flag === "holiday" || flag === "furikyu") {
        const bg = flag === "holiday"
          ? "repeating-linear-gradient(135deg,#fff8f8,#fff8f8 3pt,#fde8e8 3pt,#fde8e8 5pt)"
          : "repeating-linear-gradient(135deg,#f8f8ff,#f8f8ff 3pt,#e8eaff 3pt,#e8eaff 5pt)";
        // ブレーク行の祝日: 幅の指定だけ
        if (isBreak) {
          tbody += `<td class="pt-break-cell" style="background:${bg};"></td>`;
        } else {
          tbody += `<td class="pt-class-cell" style="background:${bg};"></td>`;
        }
        return;
      }

      if (isBreak) {
        const txt = cell.txt || cell.sub || "";
        tbody += `<td class="pt-break-cell">
          <span class="pt-break-txt">${escHtml(txt)}</span>
        </td>`;
      } else {
        const sub    = cell.sub || "";
        const txt    = cell.txt || "";
        const isK    = sub.includes("欠課") || sub.includes("けっか");
        const bgColor = isK ? "#e0e0e0" : (getPrintBgColor(sub) || "#fff");
        tbody += `<td class="pt-class-cell" style="background:${bgColor};">
          <span class="pt-sub">${escHtml(sub)}</span>
          <span class="pt-txt">${escHtml(txt)}</span>
        </td>`;
      }
    });

    tbody += "</tr>";
  });

  document.getElementById("pt-tbody").innerHTML = tbody;

  // ── おしらせ欄 ───────────────────────────────────
  // innerHTML のまま流し込む（改行・書式保持）
  const noticePad = document.getElementById("pt-notice-pad");
  noticePad.innerHTML = w.notice || "";
}

/**
 * doPrint()
 * ボタンから呼ばれるエントリポイント。
 * 1. 現在週のデータを印刷専用DOMへ流し込む
 * 2. window.print() を実行
 */
function doPrint() {
  const w    = weekData(currentMonday);
  const days = w.hasSat ? [...BASE_DAYS, "土"] : [...BASE_DAYS];
  const c    = cfg();
  buildPrint(w, days, c);
  window.print();
}

/* ─── トースト ─── */
function toast(msg, ms = 2000) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove("show"), ms);
}

/* ─── モーダル外クリックで閉じる ─── */
document.getElementById("modal-overlay").addEventListener("click", function(e) {
  if (e.target === this) closeSettings();
});
