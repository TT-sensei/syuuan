<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>週案</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

:root {
  --bg:#fdf8f2; --surface:#fffcf7; --surface2:#f5efe6;
  --border:#e0d5c5; --border2:#ccc0ad;
  --text:#3d3228; --subtext:#8a7a6a;
  --accent:#c07850; --accent2:#e8a878; --accent-bg:#fef0e6;
  --kokugo:#fff1d6; --sansu:#ddeeff; --rika:#ddf4e4; --shakai:#ffe8e8;
  --taiiku:#ffe8cc; --ongaku:#ecdeff; --zukou:#ffeedd; --seikatsu:#fff8d6;
  --dotoku:#e8f8ee; --gaikokugo:#d6f0ff; --sogo:#ffe6f5; --gakkatsu:#eee8ff; --katei:#e0f0ff; --other:#f5f2ee;
  --kokugo-b:#e8b840; --sansu-b:#5599dd; --rika-b:#44aa66; --shakai-b:#dd6666;
  --taiiku-b:#ee8833; --ongaku-b:#9966cc; --zukou-b:#dd8844; --seikatsu-b:#ccaa00;
  --dotoku-b:#44aa77; --gaikokugo-b:#3399bb; --sogo-b:#cc6699; --gakkatsu-b:#7766bb; --katei-b:#77aadd; --other-b:#aaaaaa;
  --radius:10px; --shadow:0 2px 12px rgba(100,70,30,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;}

#tabbar{background:var(--surface2);border-bottom:2px solid var(--border2);display:flex;align-items:stretch;padding:0 14px;gap:4px;position:sticky;top:0;z-index:50;}
.tab{padding:10px 18px 8px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--subtext);border-bottom:3px solid transparent;margin-bottom:-2px;font-family:inherit;transition:color .15s,border-color .15s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab:hover{color:var(--accent);}

.page{display:none;padding:14px;max-width:1200px;margin:0 auto;}
.page.active{display:block;}

#toolbar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:14px;box-shadow:var(--shadow);}
#toolbar label{font-size:11px;color:var(--subtext);font-weight:700;}
#toolbar input[type="text"],#toolbar input[type="date"],#toolbar input[type="number"]{border:1.5px solid var(--border2);background:var(--bg);color:var(--text);padding:5px 9px;border-radius:6px;font-size:13px;font-family:inherit;}
#toolbar input[type="number"]{width:52px;}
#toolbar input[type="text"]{width:100px;}
.tb-btn{padding:6px 14px;border-radius:6px;border:1.5px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;font-size:12px;font-family:inherit;font-weight:700;transition:background .15s;}
.tb-btn:hover{background:var(--surface2);}
.tb-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.tb-btn.primary:hover{background:var(--accent2);border-color:var(--accent2);}

#week-wrap{background:var(--surface);border:2px solid var(--border2);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
#week-title-bar{display:flex;align-items:center;padding:8px 16px;background:linear-gradient(135deg,#fdf0e0,#fce8d2);border-bottom:2px solid var(--border2);gap:12px;}
#title-text{font-family:'Kaisei Decol',serif;font-size:20px;font-weight:700;color:var(--accent);flex:1;letter-spacing:0.05em;}
#title-note{font-size:11px;color:var(--subtext);}

table{border-collapse:collapse;width:100%;table-layout:fixed;}
col.col-rh{width:46px;}col.col-day{width:calc((100% - 46px)/5);}
th,td{border:1px solid var(--border);vertical-align:top;padding:0;}

thead th{background:var(--surface2);text-align:center;padding:6px 3px;font-weight:700;}
thead th .day-date{font-size:18px;font-weight:900;color:var(--text);}
thead th .day-youbi{font-size:11px;color:var(--subtext);}
thead th.today-col{background:var(--accent-bg);}
thead th.today-col .day-date{color:var(--accent);}

.row-th{background:var(--surface2);text-align:center;font-weight:700;font-size:11px;vertical-align:middle;padding:3px 2px;color:var(--subtext);line-height:1.4;}
.cell-td{background:var(--surface);}
.cell-wrap{min-height:64px;cursor:pointer;position:relative;transition:box-shadow .12s;}
.cell-wrap:hover{box-shadow:inset 0 0 0 2px var(--accent2);z-index:1;}
.cell-sub-bar{display:flex;align-items:center;gap:4px;padding:3px 6px 2px;font-weight:700;font-size:11px;border-bottom:1px solid rgba(0,0,0,0.07);}
.cell-icon{font-size:13px;line-height:1;}
.cell-sub-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cell-content{padding:3px 6px 4px;font-size:10.5px;color:#5a4a3a;white-space:pre-wrap;word-break:break-all;line-height:1.5;}

.mark-btn{position:absolute;top:2px;right:2px;width:16px;height:16px;font-size:10px;border:none;background:transparent;cursor:pointer;opacity:0;color:#ccc;transition:opacity .1s,color .1s;line-height:16px;text-align:center;border-radius:3px;}
.cell-wrap:hover .mark-btn{opacity:1;}
.cell-wrap.marked .mark-btn{opacity:1;color:#e8a020;}
.cell-wrap.marked .cell-sub-bar{background:#fff3c0;}

.row-break .cell-wrap,.row-break .cell-td{background:#f8f4ef;}
.row-break .cell-wrap{min-height:26px;cursor:pointer;}
.row-break .cell-sub-bar{background:transparent;border-bottom:none;padding:2px 5px;}
.row-break .cell-content{padding:1px 5px 2px;font-size:10px;}
.row-dismiss .cell-td{background:#f0ebe4;}
.row-dismiss .cell-wrap{min-height:26px;}
.row-dismiss .cell-content{font-weight:900;font-size:14px;text-align:center;padding:4px;color:var(--text);}
.row-items .cell-td{background:#fafaf7;}
.row-items .cell-wrap{min-height:26px;}

#notice-wrap{margin-top:14px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.section-head{background:var(--surface2);padding:7px 14px;font-weight:700;font-size:12px;border-bottom:1px solid var(--border);color:var(--subtext);letter-spacing:0.05em;}
#notice-area{width:100%;min-height:80px;border:none;outline:none;padding:10px 14px;font-size:12.5px;font-family:inherit;line-height:1.8;background:var(--surface);color:var(--text);resize:vertical;}

/* 時数 */
.jisu-header-area{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
.jisu-header-area h2{font-family:'Kaisei Decol',serif;font-size:18px;color:var(--accent); margin:0;}
.standard-hours-box{background:var(--surface); border:1.5px solid var(--border); padding:6px 12px; border-radius:8px; display:flex; gap:8px; align-items:center; box-shadow:var(--shadow);}
.standard-hours-box select{padding:4px 8px; border-radius:4px; border:1px solid var(--border2); font-family:inherit;}

.jisu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:20px;}
.jisu-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.jisu-card-head{display:flex;align-items:center;gap:8px;padding:8px 12px;font-weight:700;font-size:13px;border-bottom:1px solid var(--border);}
.jisu-card-head .subj-icon{font-size:18px;}
.jisu-card-body{padding:10px 12px;}
.jisu-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.jisu-row label{font-size:11px;color:var(--subtext);width:60px;flex-shrink:0;}
.jisu-row input[type="number"]{width:60px;border:1.5px solid var(--border2);border-radius:5px;padding:4px 6px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);text-align:right;}
.jisu-row .bar-wrap{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
.jisu-row .bar-fill{height:100%;border-radius:4px;transition:width .4s;}
.jisu-total{font-size:11px;color:var(--subtext);text-align:right;margin-top:4px;padding-top:6px;border-top:1px dashed var(--border);}
.jisu-total span{font-size:16px;font-weight:900;color:var(--accent);margin:0 2px;}
.jisu-summary{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);}
.jisu-summary h3{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--subtext);}
.summary-grid{display:flex;flex-wrap:wrap;gap:8px;}
.summary-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid rgba(0,0,0,0.1);}
.summary-chip .chip-num{font-size:15px;}

/* モーダル */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(60,40,20,0.4);z-index:200;align-items:center;justify-content:center;}
#modal-overlay.open{display:flex;}
#modal{background:var(--surface);border-radius:12px;width:380px;max-width:95vw;box-shadow:0 8px 40px rgba(60,40,20,0.2);overflow:hidden;border:1.5px solid var(--border2);}
#modal-header{background:linear-gradient(135deg,#fdf0e0,#fce8d2);padding:11px 16px;font-weight:700;font-size:13px;color:var(--accent);display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);}
#modal-body{padding:14px 16px;}
#modal-body>label{display:block;font-size:11px;font-weight:700;color:var(--subtext);margin-bottom:4px;margin-top:12px;letter-spacing:0.04em;}
#modal-body>label:first-child{margin-top:0;}
#subject-presets{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;}
.preset-btn{padding:3px 9px;border-radius:20px;border:1.5px solid rgba(0,0,0,0.10);font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .1s,transform .1s;display:flex;align-items:center;gap:3px;}
.preset-btn:hover{opacity:.75;transform:scale(1.06);}
.preset-btn.selected{outline:2px solid var(--accent);}
#modal-subject{width:100%;padding:7px 10px;border:1.5px solid var(--border2);border-radius:7px;font-size:13px;font-family:inherit;font-weight:700;background:var(--bg);color:var(--text);}
#modal-content{width:100%;height:75px;padding:7px 10px;border:1.5px solid var(--border2);border-radius:7px;font-size:12px;font-family:inherit;resize:vertical;background:var(--bg);color:var(--text);}
#modal-subject:focus,#modal-content:focus{outline:2px solid var(--accent2);border-color:transparent;}
#modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:10px 16px;border-top:1px solid var(--border);background:var(--surface2);}
.modal-btn{padding:6px 16px;border-radius:6px;border:1.5px solid var(--border2);cursor:pointer;font-size:12px;font-family:inherit;font-weight:700;background:var(--surface);color:var(--text);transition:background .12s;}
.modal-btn:hover{background:var(--surface2);}
.modal-btn.ok{background:var(--accent);color:#fff;border-color:var(--accent);}
.modal-btn.ok:hover{background:var(--accent2);border-color:var(--accent2);}
.modal-btn.del{background:#fee2e2;color:#c0392b;border-color:#f5c0b0;}

/* サジェスト(履歴)UI */
#history-suggests{display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; max-height:80px; overflow-y:auto;}
.suggest-chip{background:var(--surface2); border:1px solid var(--border2); padding:4px 8px; border-radius:4px; font-size:11px; cursor:pointer; color:var(--text); transition:0.1s;}
.suggest-chip:hover{background:var(--border); transform:translateY(-1px);}
.suggest-title{width:100%; font-size:10px; color:var(--subtext); margin-bottom:2px;}

/* ===== 週ナビゲーター ===== */
#week-nav{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:8px 14px;box-shadow:var(--shadow);
}
.nav-arrow{
  width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border2);
  background:var(--surface);color:var(--text);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,transform .1s;flex-shrink:0;
}
.nav-arrow:hover{background:var(--surface2);transform:scale(1.1);}
.nav-arrow:active{transform:scale(0.93);}
#nav-center{flex:1;text-align:center;}
#nav-week-label{
  font-family:'Kaisei Decol',serif;font-size:17px;font-weight:700;
  color:var(--accent);letter-spacing:0.04em;display:block;
}
#nav-date-label{font-size:11px;color:var(--subtext);margin-top:1px;display:block;}
.nav-dots{display:flex;justify-content:center;gap:5px;margin-top:5px;}
.nav-dot{
  width:7px;height:7px;border-radius:50%;background:var(--border2);
  cursor:pointer;transition:background .2s,transform .2s;
}
.nav-dot.active{background:var(--accent);transform:scale(1.3);}

/* ===== スライドアニメーション ===== */
#week-slide-host{overflow:hidden;position:relative;}
.week-slide{
  transition:transform .32s cubic-bezier(.4,0,.2,1),opacity .32s;
  will-change:transform,opacity;
}
.week-slide.slide-out-left {transform:translateX(-60px);opacity:0;pointer-events:none;}
.week-slide.slide-out-right{transform:translateX( 60px);opacity:0;pointer-events:none;}
.week-slide.slide-in-left  {transform:translateX( 60px);opacity:0;}
.week-slide.slide-in-right {transform:translateX(-60px);opacity:0;}
.week-slide.slide-active   {transform:translateX(0);opacity:1;}

@media print{
  #tabbar,#toolbar,#week-nav,#notice-wrap,.mark-btn,#jisu-page{display:none!important;}
  body{background:#fff;}
  #main-page{padding:0;max-width:100%;}
  .page{display:block!important;}
  #week-wrap{box-shadow:none;border:1pt solid #888;border-radius:0;}
  #week-title-bar{background:#fff;}
  th,td{border-color:#aaa;}
  .cell-wrap{min-height:52px;}
  @page{size:A4 landscape;margin:8mm;}
}
</style>
</head>
<body>
<div id="tabbar">
  <button class="tab active" onclick="switchTab('main')">📅 週案</button>
  <button class="tab" onclick="switchTab('jisu')">📊 時数管理</button>
</div>

<div class="page active" id="main-page">
  <div id="toolbar">
    <label>学年組</label><input type="text" id="class-name" placeholder="3年1組" style="width:90px">
    <label>月</label><input type="number" id="month-num" min="1" max="12" value="3" style="width:52px">
    <label>週</label><input type="number" id="week-num" min="1" max="6" value="1" style="width:48px">
    <label>月曜</label><input type="date" id="monday-date" onchange="onDateChange()">
    <button class="tb-btn primary" onclick="renderWeek()">表示</button>
    <button class="tb-btn" onclick="copyPrev()">前週コピー</button>
    <button class="tb-btn" onclick="saveJSON()">💾 保存</button>
    <label for="load-file" class="tb-btn" style="cursor:pointer">📂 読込</label>
    <input type="file" id="load-file" accept=".json" style="display:none" onchange="loadJSON(event)">
    <button class="tb-btn" onclick="window.print()">🖨 印刷</button>
  </div>

  <div id="week-nav" style="display:none">
    <button class="nav-arrow" id="nav-prev" onclick="shiftWeek(-1)" title="前の週">‹</button>
    <div id="nav-center">
      <span id="nav-week-label"></span>
      <span id="nav-date-label"></span>
      <div class="nav-dots" id="nav-dots"></div>
    </div>
    <button class="nav-arrow" id="nav-next" onclick="shiftWeek(1)" title="次の週">›</button>
  </div>

  <div id="week-slide-host">
    <div id="week-wrap" class="week-slide" style="display:none">
      <div id="week-title-bar">
        <div id="title-text"></div>
        <div id="title-note">変更することがあります。</div>
      </div>
      <table id="week-table">
        <colgroup><col class="col-rh"><col class="col-day"><col class="col-day"><col class="col-day"><col class="col-day"><col class="col-day"></colgroup>
        <thead id="week-thead"></thead>
        <tbody id="week-tbody"></tbody>
      </table>
    </div>
  </div>
  <div id="notice-wrap" style="display:none">
    <div class="section-head">📢 おしらせ</div>
    <textarea id="notice-area" placeholder="おしらせ欄（保護者向けなど）"></textarea>
  </div>
</div>

<div class="page" id="jisu-page">
  <div class="jisu-header-area">
    <h2>📊 時数管理</h2>
    <div class="standard-hours-box">
      <span style="font-size:12px; font-weight:bold;">標準時数セット:</span>
      <select id="grade-select">
        <option value="">学年を選択</option>
        <option value="1">1年</option>
        <option value="2">2年</option>
        <option value="3">3年</option>
        <option value="4">4年</option>
        <option value="5">5年</option>
        <option value="6">6年</option>
      </select>
      <button class="tb-btn" onclick="applyStandardHours()">適用</button>
    </div>
  </div>
  <div id="jisu-grid" class="jisu-grid"></div>
  <div class="jisu-summary"><h3>合計サマリー</h3><div id="summary-grid" class="summary-grid"></div></div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <div id="modal-header"><span id="modal-icon"></span><span id="modal-title"></span></div>
    <div id="modal-body">
      <label>教科（プリセットをタップ、または下欄に直接入力）</label>
      <div id="subject-presets"></div>
      <label>教科名（直接入力）</label>
      <input type="text" id="modal-subject" placeholder="教科名" oninput="renderSuggestions(this.value)">
      <label>単元・内容</label>
      <textarea id="modal-content" placeholder="単元名・活動内容など"></textarea>
      <div id="history-suggests"></div>
    </div>
    <div id="modal-footer">
      <button class="modal-btn del" onclick="deleteCell()">クリア</button>
      <button class="modal-btn" onclick="closeModal()">キャンセル</button>
      <button class="modal-btn ok" onclick="saveCell()">OK</button>
    </div>
  </div>
</div>

<script>
const DAYS_JP=["月","火","水","木","金"];
const YOUBI=["（月）","（火）","（水）","（木）","（金）"];

// 追加：家庭科をリストに追加
const SUBJECTS=[
  {name:"国語",cls:"kokugo",icon:"📖"},{name:"算数",cls:"sansu",icon:"🔢"},
  {name:"理科",cls:"rika",icon:"🔬"},{name:"社会",cls:"shakai",icon:"🌍"},
  {name:"体育",cls:"taiiku",icon:"⚽"},{name:"音楽",cls:"ongaku",icon:"🎵"},
  {name:"図工",cls:"zukou",icon:"🎨"},{name:"生活",cls:"seikatsu",icon:"🌱"},
  {name:"家庭",cls:"katei",icon:"🧵"},
  {name:"道徳",cls:"dotoku",icon:"🌸"},{name:"外国語",cls:"gaikokugo",icon:"🌐"},
  {name:"総合",cls:"sogo",icon:"💡"},{name:"学活",cls:"gakkatsu",icon:"🏫"},
  {name:"書写",cls:"kokugo",icon:"✏️"},
];

// 追加：文部科学省の標準授業時数データ
const STANDARD_HOURS = {
  1: { 国語:306, 算数:136, 生活:102, 音楽:68, 図工:68, 体育:102, 道徳:34, 学活:34 },
  2: { 国語:315, 算数:175, 生活:105, 音楽:70, 図工:70, 体育:105, 道徳:35, 学活:35 },
  3: { 国語:245, 社会:70,  算数:175, 理科:90,  音楽:60, 図工:60, 体育:105, 道徳:35, 外国語:35, 総合:70, 学活:35 },
  4: { 国語:245, 社会:90,  算数:175, 理科:105, 音楽:60, 図工:60, 体育:105, 道徳:35, 外国語:35, 総合:70, 学活:35 },
  5: { 国語:175, 社会:100, 算数:175, 理科:105, 音楽:50, 図工:50, 家庭:60, 体育:90,  外国語:70, 道徳:35, 総合:70, 学活:35 },
  6: { 国語:175, 社会:105, 算数:175, 理科:105, 音楽:50, 図工:50, 家庭:55, 体育:90,  外国語:70, 道徳:35, 総合:70, 学活:35 }
};

function getSubject(name){return SUBJECTS.find(s=>name&&name.includes(s.name))||{cls:"other",icon:"📝"};}
const ROWS=[
  {key:"asa",label:"あさ",cls:"row-asa",hasSub:true},
  {key:"p1",label:"1",cls:"row-period",hasSub:true},
  {key:"p2",label:"2",cls:"row-period",hasSub:true},
  {key:"naka",label:"中",cls:"row-break",hasSub:false},
  {key:"p3",label:"3",cls:"row-period",hasSub:true},
  {key:"p4",label:"4",cls:"row-period",hasSub:true},
  {key:"hiru",label:"昼①\n昼②",cls:"row-break",hasSub:false},
  {key:"p5",label:"5",cls:"row-period",hasSub:true},
  {key:"p6",label:"6",cls:"row-period",hasSub:true},
  {key:"dismiss",label:"下校\n時刻",cls:"row-dismiss",hasSub:false},
  {key:"items",label:"持ち物\nなど",cls:"row-items",hasSub:false},
];
const PERIOD_ROWS=["p1","p2","p3","p4","p5","p6"];

let store=JSON.parse(localStorage.getItem("weekPlan_v3")||"{}");
let currentKey=null,editTarget=null;

function ensureWeek(m){
  if(!store[m]){
    store[m]={cells:{},notice:""};
    for(let d=0;d<5;d++) store[m].cells["dismiss-"+d]={sub:"",txt:"14:25"};
  }
  return store[m];
}
function ensureJisu(){
  if(!store["_jisu"]){
    store["_jisu"]={};
    SUBJECTS.forEach(s=>store["_jisu"][s.name]={plan:0,done:0});
  }
  return store["_jisu"];
}
function saveStore(){localStorage.setItem("weekPlan_v3",JSON.stringify(store));}

function switchTab(id){
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",(i===0&&id==="main")||(i===1&&id==="jisu")));
  document.getElementById("main-page").classList.toggle("active",id==="main");
  document.getElementById("jisu-page").classList.toggle("active",id==="jisu");
  if(id==="jisu") renderJisu();
}

function getMondayDate(){return document.getElementById("monday-date").value;}

function onDateChange(){
  const v=document.getElementById("monday-date").value;
  if(!v)return;
  const d=new Date(v);
  document.getElementById("month-num").value=d.getMonth()+1;
  document.getElementById("week-num").value=Math.ceil(d.getDate()/7);
}

function updateNav(monday){
  if(!monday)return;
  const cn=document.getElementById("class-name").value||"";
  const mo=document.getElementById("month-num").value||"";
  const wn=document.getElementById("week-num").value||"";
  document.getElementById("nav-week-label").textContent=cn+"　"+mo+"月"+wn+"週案";
  const dt=new Date(monday);
  const end=new Date(monday);end.setDate(end.getDate()+4);
  document.getElementById("nav-date-label").textContent=
    (dt.getMonth()+1)+"/"+dt.getDate()+"（月）〜"+(end.getMonth()+1)+"/"+end.getDate()+"（金）";
  const dots=document.getElementById("nav-dots");
  dots.innerHTML="";
  for(let i=-3;i<=3;i++){
    const d=new Date(monday);d.setDate(d.getDate()+i*7);
    const iso=d.toISOString().slice(0,10);
    const dot=document.createElement("div");
    dot.className="nav-dot"+(i===0?" active":"");
    const hasData=store[iso]&&Object.keys(store[iso].cells||{}).some(k=>{
      const c=store[iso].cells[k];return c&&(c.sub||c.txt);
    });
    if(hasData&&i!==0)dot.style.background="#c0a080";
    dot.title=iso;
    dot.onclick=(()=>{const k=iso;return()=>navigateTo(k);})(  );
    dots.appendChild(dot);
  }
  document.getElementById("week-nav").style.display="";
}

let isAnimating=false;
function shiftWeek(dir){
  if(isAnimating)return;
  const monday=getMondayDate();if(!monday)return;
  const next=new Date(monday);next.setDate(next.getDate()+dir*7);
  navigateTo(next.toISOString().slice(0,10), dir>0?"left":"right");
}

function navigateTo(iso, dir="left"){
  if(isAnimating)return;
  const wrap=document.getElementById("week-wrap");
  if(wrap.style.display==="none"){
    document.getElementById("monday-date").value=iso;
    onDateChange();renderWeek();return;
  }
  isAnimating=true;
  wrap.classList.add(dir==="left"?"slide-out-left":"slide-out-right");
  setTimeout(()=>{
    document.getElementById("monday-date").value=iso;
    onDateChange();
    wrap.classList.remove("slide-out-left","slide-out-right","slide-active");
    wrap.classList.add(dir==="left"?"slide-in-left":"slide-in-right");
    renderWeekInner(); 
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        wrap.classList.remove("slide-in-left","slide-in-right");
        wrap.classList.add("slide-active");
        setTimeout(()=>{ wrap.classList.remove("slide-active"); isAnimating=false; },350);
      });
    });
  },300);
}

let touchStartX=0,touchStartY=0;
document.getElementById("week-slide-host").addEventListener("touchstart",e=>{
  touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;
},{passive:true});
document.getElementById("week-slide-host").addEventListener("touchend",e=>{
  if(isAnimating)return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>40&&Math.abs(dx)>Math.abs(dy)*1.5){
    shiftWeek(dx<0?1:-1);
  }
},{passive:true});

document.addEventListener("keydown",e=>{
  if(document.getElementById("modal-overlay").classList.contains("open"))return;
  if(e.key==="ArrowLeft"&&!e.ctrlKey&&!e.metaKey)shiftWeek(-1);
  if(e.key==="ArrowRight"&&!e.ctrlKey&&!e.metaKey)shiftWeek(1);
});

function renderWeekInner(){
  const monday=getMondayDate();
  currentKey=monday; ensureWeek(monday);
  const cn=document.getElementById("class-name").value||"";
  const mo=document.getElementById("month-num").value||"";
  const wn=document.getElementById("week-num").value||"";
  document.getElementById("title-text").textContent=cn+"　"+mo+"月"+wn+"週案";
  _buildTable(monday);
  document.getElementById("week-wrap").style.display="";
  document.getElementById("notice-wrap").style.display="";
  document.getElementById("notice-area").value=(store[monday]||{}).notice||"";
  updateNav(monday);
}

function renderWeek(){
  const monday=getMondayDate();
  if(!monday){alert("月曜日の日付を選択してください");return;}
  currentKey=monday; ensureWeek(monday);
  const cn=document.getElementById("class-name").value||"";
  const mo=document.getElementById("month-num").value||"";
  const wn=document.getElementById("week-num").value||"";
  document.getElementById("title-text").textContent=cn+"　"+mo+"月"+wn+"週案";
  _buildTable(monday);
  document.getElementById("week-wrap").style.display="";
  document.getElementById("notice-wrap").style.display="";
  document.getElementById("notice-area").value=store[monday].notice||"";
  updateNav(monday);
}

function _buildTable(monday){
  ensureWeek(monday);
  const todayStr=new Date().toISOString().slice(0,10);
  const thead=document.getElementById("week-thead");
  let hRow="<tr><th></th>";
  for(let d=0;d<5;d++){
    const dt=new Date(monday);dt.setDate(dt.getDate()+d);
    const iso=dt.toISOString().slice(0,10);
    const isT=iso===todayStr;
    hRow+=`<th${isT?' class="today-col"':''}><div class="day-date">${dt.getDate()}</div><div class="day-youbi">日${YOUBI[d]}</div></th>`;
  }
  thead.innerHTML=hRow+"</tr>";
  const tbody=document.getElementById("week-tbody");
  tbody.innerHTML="";
  const wdata=store[monday];
  ROWS.forEach(row=>{
    const tr=document.createElement("tr");
    tr.className=row.cls;
    const th=document.createElement("th");
    th.className="row-th";
    th.innerHTML=row.label.replace("\n","<br>");
    tr.appendChild(th);
    for(let d=0;d<5;d++){
      const td=document.createElement("td");
      td.className="cell-td";
      const ck=row.key+"-"+d;
      const cell=wdata.cells[ck]||{sub:"",txt:""};
      const subj=getSubject(cell.sub);
      const wrap=document.createElement("div");
      wrap.className="cell-wrap "+subj.cls+(cell.marked?" marked":"");
      if(row.hasSub){
        wrap.innerHTML=`<button class="mark-btn" onclick="toggleMark(event,'${monday}','${ck}')">★</button><div class="cell-sub-bar"><span class="cell-icon">${cell.sub?subj.icon:""}</span><span class="cell-sub-name">${esc(cell.sub)}</span></div><div class="cell-content">${esc(cell.txt)}</div>`;
        wrap.addEventListener("click",e=>{if(e.target.classList.contains("mark-btn"))return;openModal(monday,row.key,d);});
      }else{
        wrap.innerHTML=`<div class="cell-sub-bar"><span class="cell-sub-name">${esc(cell.sub)}</span></div><div class="cell-content">${esc(cell.txt)}</div>`;
        wrap.addEventListener("click",()=>openModal(monday,row.key,d));
      }
      td.appendChild(wrap);tr.appendChild(td);
    }
    tbody.appendChild(tr);
  });
}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// 追加：履歴の表示関数
function renderSuggestions(subject) {
  const container = document.getElementById("history-suggests");
  container.innerHTML = "";
  if(!subject || !store["_history"] || !store["_history"][subject]) return;
  
  const hist = store["_history"][subject];
  if(hist.length > 0) {
    const title = document.createElement("div");
    title.className = "suggest-title";
    title.textContent = `💡 「${subject}」の入力履歴`;
    container.appendChild(title);
    
    hist.forEach(txt => {
      const chip = document.createElement("div");
      chip.className = "suggest-chip";
      chip.textContent = txt.length > 20 ? txt.slice(0, 20) + "..." : txt; // 長すぎる場合は省略表示
      chip.onclick = () => { document.getElementById("modal-content").value = txt; };
      container.appendChild(chip);
    });
  }
}

function openModal(monday,rowKey,dayIdx){
  editTarget={monday,rowKey,dayIdx};
  const ck=rowKey+"-"+dayIdx;
  const cell=(store[monday]||{cells:{}}).cells[ck]||{sub:"",txt:""};
  const dt=new Date(monday);dt.setDate(dt.getDate()+dayIdx);
  const rowLabel=(ROWS.find(r=>r.key===rowKey)||{label:rowKey}).label.replace("\n","");
  const subj=getSubject(cell.sub);
  document.getElementById("modal-icon").textContent=(cell.sub?subj.icon+"  ":"✏️ ");
  document.getElementById("modal-title").textContent=(dt.getMonth()+1)+"/"+dt.getDate()+"（"+DAYS_JP[dayIdx]+"）　"+rowLabel;
  document.getElementById("modal-subject").value=cell.sub||"";
  document.getElementById("modal-content").value=cell.txt||"";
  const presets=document.getElementById("subject-presets");
  presets.innerHTML="";
  SUBJECTS.forEach(s=>{
    const btn=document.createElement("button");
    btn.className="preset-btn"+(cell.sub===s.name?" selected":"");
    btn.style.background="var(--"+s.cls+")";
    btn.innerHTML=s.icon+" "+s.name;
    btn.onclick=()=>{
      document.getElementById("modal-subject").value=s.name;
      presets.querySelectorAll(".preset-btn").forEach(b=>b.classList.remove("selected"));
      btn.classList.add("selected");
      renderSuggestions(s.name); // プリセット選択時にもサジェストを更新
    };
    presets.appendChild(btn);
  });
  
  // モーダルを開いた時に、既存の教科名があればサジェストを表示
  renderSuggestions(cell.sub);

  document.getElementById("modal-overlay").classList.add("open");
  setTimeout(()=>document.getElementById("modal-subject").focus(),80);
}

function closeModal(){document.getElementById("modal-overlay").classList.remove("open");editTarget=null;}

function saveCell(){
  if(!editTarget)return;
  const{monday,rowKey,dayIdx}=editTarget;
  const ck=rowKey+"-"+dayIdx;
  const sub=document.getElementById("modal-subject").value.trim();
  const txt=document.getElementById("modal-content").value.trim();
  ensureWeek(monday);
  
  // 追加：履歴の保存
  if (sub && txt) {
    if (!store["_history"]) store["_history"] = {};
    if (!store["_history"][sub]) store["_history"][sub] = [];
    let hist = store["_history"][sub];
    
    // 既存の同じテキストがあれば削除（一番上に持ってくるため）
    hist = hist.filter(t => t !== txt);
    hist.unshift(txt); // 先頭に追加
    
    // 履歴は最新15件まで保持
    if (hist.length > 15) hist.pop();
    store["_history"][sub] = hist;
  }

  const ex=store[monday].cells[ck]||{};
  store[monday].cells[ck]={...ex,sub,txt};
  saveStore();closeModal();renderWeekInner();
}

function deleteCell(){
  if(!editTarget)return;
  const{monday,rowKey,dayIdx}=editTarget;
  const ck=rowKey+"-"+dayIdx;
  ensureWeek(monday);
  store[monday].cells[ck]={sub:"",txt:""};
  saveStore();closeModal();renderWeekInner();
}

function toggleMark(e,monday,ck){
  e.stopPropagation();ensureWeek(monday);
  if(!store[monday].cells[ck])store[monday].cells[ck]={};
  store[monday].cells[ck].marked=!store[monday].cells[ck].marked;
  saveStore();renderWeekInner();
}

document.getElementById("modal-overlay").addEventListener("click",function(e){if(e.target===this)closeModal();});
document.addEventListener("keydown",e=>{
  if(e.key==="Escape")closeModal();
  if((e.key==="Enter"&&e.ctrlKey)||(e.key==="Enter"&&e.metaKey))saveCell();
});
document.getElementById("notice-area").addEventListener("input",()=>{
  if(!currentKey)return;
  ensureWeek(currentKey);
  store[currentKey].notice=document.getElementById("notice-area").value;
  saveStore();
});

function copyPrev(){
  const monday=getMondayDate();if(!monday)return;
  const prev=new Date(monday);prev.setDate(prev.getDate()-7);
  const pk=prev.toISOString().slice(0,10);
  if(!store[pk]){alert("前週のデータがありません");return;}
  if(!confirm("前週をコピーします（現在の内容は上書きされます）"))return;
  store[monday]=JSON.parse(JSON.stringify(store[pk]));
  saveStore();renderWeekInner();
}

function saveJSON(){
  const monday=getMondayDate();
  const blob=new Blob([JSON.stringify(store,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=monday?"週案_"+monday+".json":"週案データ.json";
  a.click();
}

function loadJSON(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{Object.assign(store,JSON.parse(reader.result));saveStore();alert("読み込みました");if(currentKey)renderWeekInner();}
    catch{alert("読み込みエラー");}
  };
  reader.readAsText(file);e.target.value="";
}

// 追加：標準時数をセットする関数
function applyStandardHours() {
  const grade = document.getElementById("grade-select").value;
  if(!grade) return alert("学年を選択してください");
  
  if(!confirm(`${grade}年生の標準時数を「年間計画」にセットしますか？\n（現在入力されている年間計画の数字は上書きされます）`)) return;

  const hrs = STANDARD_HOURS[grade];
  const jisu = ensureJisu();
  
  SUBJECTS.forEach(s => {
    if(!jisu[s.name]) jisu[s.name] = {plan:0, done:0};
    // 文科省のデータに存在すればその数字、なければ0をセット
    jisu[s.name].plan = hrs[s.name] || 0;
  });
  
  saveStore();
  renderJisu();
  alert("標準時数をセットしました！");
}

function renderJisu(){
  const jisu=ensureJisu();
  const weekCounts={};
  if(currentKey&&store[currentKey]){
    const wdata=store[currentKey];
    PERIOD_ROWS.forEach(rk=>{
      for(let d=0;d<5;d++){
        const cell=wdata.cells[rk+"-"+d];
        if(cell&&cell.sub){
          const s=SUBJECTS.find(s=>cell.sub.includes(s.name));
          if(s)weekCounts[s.name]=(weekCounts[s.name]||0)+1;
        }
      }
    });
  }
  const grid=document.getElementById("jisu-grid");
  grid.innerHTML="";
  SUBJECTS.filter((s,i,a)=>a.findIndex(x=>x.name===s.name)===i).forEach(s=>{
    const j=jisu[s.name]||{plan:0,done:0};
    const thisWeek=weekCounts[s.name]||0;
    const total=j.done+thisWeek;
    const pct=j.plan>0?Math.min(100,Math.round(total/j.plan*100)):0;
    const bcolor="var(--"+s.cls+"-b)";
    const card=document.createElement("div");
    card.className="jisu-card";
    card.style.borderTop="4px solid "+bcolor;
    card.innerHTML=`<div class="jisu-card-head" style="background:var(--${s.cls})"><span class="subj-icon">${s.icon}</span><span>${s.name}</span></div>
<div class="jisu-card-body">
  <div class="jisu-row"><label>年間計画</label><input type="number" min="0" max="999" value="${j.plan}" onchange="updateJisu('${s.name}','plan',this.value)"><span style="font-size:11px;color:var(--subtext)">時間</span></div>
  <div class="jisu-row"><label>累計済</label><input type="number" min="0" max="999" value="${j.done}" onchange="updateJisu('${s.name}','done',this.value)"><span style="font-size:11px;color:var(--subtext)">時間</span></div>
  ${currentKey?`<div class="jisu-row"><label>今週予定</label><span style="font-size:15px;font-weight:900;color:var(--accent)">${thisWeek}</span><span style="font-size:11px;color:var(--subtext)">時間（週案より自動）</span></div>`:""}
  <div class="jisu-row"><label>達成率</label><div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${bcolor};opacity:0.75"></div></div><span style="font-size:11px;font-weight:700">${pct}%</span></div>
  <div class="jisu-total">累計 <span>${total}</span> / <span>${j.plan||"???"}</span> 時間</div>
</div>`;
    grid.appendChild(card);
  });
  const sg=document.getElementById("summary-grid");
  sg.innerHTML="";
  SUBJECTS.filter((s,i,a)=>a.findIndex(x=>x.name===s.name)===i).forEach(s=>{
    const j=jisu[s.name]||{plan:0,done:0};
    const thisWeek=weekCounts[s.name]||0;
    const total=j.done+thisWeek;
    if(total===0&&j.plan===0)return;
    const chip=document.createElement("div");
    chip.className="summary-chip";
    chip.style.background="var(--"+s.cls+")";
    chip.innerHTML=s.icon+" "+s.name+` <span class="chip-num">${total}</span>時`;
    sg.appendChild(chip);
  });
}

function updateJisu(name,field,val){
  const jisu=ensureJisu();
  if(!jisu[name])jisu[name]={plan:0,done:0};
  jisu[name][field]=parseInt(val)||0;
  saveStore();
  renderJisu();
}

(function init(){
  const today=new Date();
  const dow=today.getDay();
  const diff=dow===0?-6:1-dow;
  const monday=new Date(today);monday.setDate(today.getDate()+diff);
  const iso=monday.toISOString().slice(0,10);
  document.getElementById("monday-date").value=iso;
  document.getElementById("month-num").value=monday.getMonth()+1;
  document.getElementById("week-num").value=Math.ceil(monday.getDate()/7);
})();
</script>
