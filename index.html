<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サクサク週案</title>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fdf8f2; --surface:#fffcf7; --surface2:#f5efe6;
  --border:#c8bfb0; --border2:#b0a090;
  --text:#3d3228; --subtext:#8a7a6a;
  --accent:#c07850;
  /* 教科色 */
  --kokugo:   #fff0c8; --syasya:   #d4f0e0; --sansu:    #cce4ff;
  --seikatsu: #fff8c0; --rika:     #c8f0d8; --shakai:   #ffd8d8;
  --ongaku:   #e8d4ff; --zukou:    #ffd8b0; --katei:    #b8e4ff;
  --taiiku:   #ffe0b0; --dotoku:   #d0f4e8; --gaikokugo:#d8f0c0;
  --sogo:     #ffd8f0; --gakkatsu: #ddd8ff; --gyoji:    #ffe8c8;
  --iinkai:   #b8f0f8; --club:     #ffc8d8; --kekka:    #d8d4ce;
  --radius:8px;
}
*{ box-sizing:border-box; margin:0; padding:0; }
body{ font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ===== ツールバー ===== */
#toolbar{
  background:var(--surface); border-bottom:2px solid var(--border2);
  padding:8px 14px; display:flex; flex-wrap:wrap; align-items:center; gap:8px;
  position:sticky; top:0; z-index:50;
}
#toolbar .app-title{ font-family:'Kaisei Decol',serif; font-size:16px; font-weight:700; color:var(--accent); margin-right:6px; }
#toolbar label{ font-size:11px; font-weight:700; color:var(--subtext); display:flex; align-items:center; gap:3px; }
#toolbar input[type="text"],#toolbar input[type="date"],#toolbar input[type="number"]{
  border:1.5px solid var(--border2); background:var(--bg); color:var(--text);
  padding:4px 7px; border-radius:5px; font-size:13px; font-family:inherit;
}
#toolbar input[type="number"]{ width:50px; }
#toolbar input[type="text"]  { width:90px; }
.tb-btn{
  padding:5px 12px; border-radius:6px; border:1.5px solid var(--border2);
  background:var(--surface); color:var(--text); cursor:pointer;
  font-size:12px; font-family:inherit; font-weight:700; transition:.1s;
}
.tb-btn:hover{ background:var(--surface2); }
.tb-btn.primary{ background:var(--accent); color:#fff; border-color:var(--accent); }
.tb-btn.primary:hover{ opacity:.9; }
#sat-label{
  background:#fffaf0; border:1px solid #f0e0c0;
  border-radius:5px; padding:3px 8px; font-size:12px; font-weight:700;
  display:flex; align-items:center; gap:4px; cursor:pointer;
}
#mode-btn{ margin-left:4px; }

/* ===== ページ ===== */
.page{ display:none; padding:14px; max-width:1400px; margin:0 auto; }
.page.active{ display:block; }

/* ===== タブバー ===== */
#tabbar{
  background:var(--surface); border-bottom:2px solid var(--border2);
  display:flex; align-items:stretch; padding:0 14px; gap:4px;
}
.tab{
  padding:9px 18px 7px; font-size:13px; font-weight:700; cursor:pointer;
  border:none; background:transparent; color:var(--subtext);
  border-bottom:3px solid transparent; margin-bottom:-2px;
  font-family:inherit; transition:.15s;
}
.tab.active{ color:var(--accent); border-bottom-color:var(--accent); }
.tab:hover{ color:var(--accent); }

/* ===== 週ナビ ===== */
#week-nav{
  display:flex; align-items:center; gap:10px; margin-bottom:12px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:8px 14px;
  box-shadow:0 1px 4px rgba(100,70,30,.08);
}
.nav-arrow{
  width:34px; height:34px; border-radius:50%;
  border:1.5px solid var(--border2); background:var(--surface);
  cursor:pointer; font-size:16px; font-weight:bold;
  display:flex; align-items:center; justify-content:center; transition:.1s;
}
.nav-arrow:hover{ background:var(--surface2); }
#nav-center{ flex:1; text-align:center; }
#nav-week-label{ font-family:'Kaisei Decol',serif; font-size:18px; font-weight:700; color:var(--accent); display:block; }
#nav-date-label{ font-size:11px; color:var(--subtext); display:block; margin-top:1px; }
.nav-dots{ display:flex; justify-content:center; gap:5px; margin-top:4px; }
.nav-dot{ width:7px; height:7px; border-radius:50%; background:var(--border2); cursor:pointer; transition:.2s; }
.nav-dot.active{ background:var(--accent); transform:scale(1.3); }
.nav-dot.has-data{ background:#c0a080; }

/* ===== テーブルラッパー ===== */
.left{ background:var(--surface); border-radius:var(--radius); padding:14px; border:1px solid var(--border); overflow:auto; }
#table-wrapper{ position:relative; }

table{ border-collapse:collapse; width:100%; table-layout:fixed; margin-bottom:12px; }
th,td{ border:1.5px solid var(--border2); vertical-align:top; font-size:13px; }
th{
  background:var(--surface2); text-align:center; font-weight:700;
  padding:7px 4px; letter-spacing:.02em; border-bottom:2px solid var(--border2);
}
.time-col{
  background:#ede6da; text-align:center; font-weight:900;
  width:28px; vertical-align:middle; padding:2px; font-size:13px;
  color:var(--accent); border-right:2px solid var(--border2);
}
td.editable-cell{ cursor:text; padding:6px 8px; }
td.active-cell{ box-shadow:inset 0 0 0 2px var(--accent) !important; background-color:#fffaf0 !important; }

.cell-sub{
  font-weight:700; font-size:16px; padding-bottom:4px;
  border-bottom:1.5px solid rgba(0,0,0,.18); margin-bottom:5px;
  outline:none; letter-spacing:.03em; color:#2a2018; position:relative; z-index:2;
}
.cell-txt{
  font-size:13px; color:#5a4a3a; min-height:38px; outline:none; line-height:1.6;
  position:relative; z-index:2;
}
tr.break-row td.editable-cell{
  background:#f7f3ed; padding:5px 8px;
  border-top:1px dashed var(--border2); border-bottom:1px dashed var(--border2);
}
tr.break-row.items-row td.editable-cell{ background:#fdfaf5; }
tr.break-row.items-row .cell-txt{ min-height:32px; text-align:left; font-style:normal; font-size:12px; }
td.items-cell .cell-txt{ min-height:32px !important; text-align:left !important; font-style:normal !important; }
tr.break-row .cell-txt{ min-height:22px; color:#7a6a5a; font-size:12px; text-align:center; font-style:italic; }
[contenteditable]:empty:before{ content:attr(placeholder); color:#c8bab0; pointer-events:none; display:block; }

/* ===== ヘッダーフラグ ===== */
th.holiday-col{ background:#ffd6d6 !important; color:#900 !important; }
th.furikyu-col{ background:#dbe6ff !important; color:#223 !important; }
.th-badge{
  display:inline-block; font-size:10px; font-weight:900;
  padding:1px 5px; border-radius:4px; margin-left:3px; cursor:pointer;
  box-shadow:0 1px 2px rgba(0,0,0,.1);
}
.th-badge.holiday{ background:#ff8a8a; color:#fff; border:1px solid #e06060; }
.th-badge.furikyu{ background:#8aabff; color:#fff; border:1px solid #6080e0; }
.th-badge.clear  { background:#eee;    color:#666; border:1px solid #ccc; }

td.holiday-cell{
  background:repeating-linear-gradient(135deg,#fff0f0,#fff0f0 6px,#ffe0e0 6px,#ffe0e0 12px) !important;
  pointer-events:none;
}
td.furikyu-cell{
  background:repeating-linear-gradient(135deg,#f0f0ff,#f0f0ff 6px,#e0e8ff 6px,#e0e8ff 12px) !important;
  pointer-events:none;
}

/* フローティングボックス */
.day-float-box{
  position:absolute; background:#fff; border:2px solid #ccc; border-radius:10px;
  box-shadow:2px 2px 10px rgba(0,0,0,.12); z-index:10;
  display:flex; align-items:center; justify-content:center; padding:8px 4px; cursor:text;
}
.day-float-box.holiday-box{ border-color:#e08080; }
.day-float-box.furikyu-box{ border-color:#8090e0; }
.day-float-inner{
  writing-mode:vertical-rl; font-size:22px; font-weight:900; letter-spacing:.15em;
  line-height:1.2; outline:none; text-align:center; min-height:40px; cursor:text;
}
.day-float-box.holiday-box .day-float-inner{ color:#900; }
.day-float-box.furikyu-box .day-float-inner{ color:#226; }

/* 欠課セル */
td.kekka-cell{ position:relative; background:#d8d0c8 !important; }
td.kekka-cell::after{
  content:""; position:absolute; inset:0;
  background:repeating-linear-gradient(135deg,transparent,transparent 6px,rgba(120,100,80,.3) 6px,rgba(120,100,80,.3) 8px);
  pointer-events:none; z-index:1;
}
td.kekka-cell .cell-sub, td.kekka-cell .cell-txt{ position:relative; z-index:2; color:#777 !important; }
td.kekka-cell .cell-sub{ border-bottom-color:rgba(0,0,0,.15) !important; }

/* 空欄強調 */
td.cell-empty{ outline:2px dashed #e8b090 !important; outline-offset:-2px; }
td.cell-empty .cell-sub{ background:repeating-linear-gradient(45deg,#fdf0e8,#fdf0e8 4px,#fff7f2 4px,#fff7f2 8px) !important; }

/* ===== サイドパネル ===== */
.wrapper{ display:flex; gap:14px; align-items:flex-start; }
.right{ flex:0 0 300px; display:flex; flex-direction:column; gap:12px; position:sticky; top:58px; }

.card{ background:var(--surface); border-radius:var(--radius); padding:12px; border:1px solid var(--border); }
.card h3{ margin:0 0 8px; font-size:13px; border-bottom:2px solid var(--border); padding-bottom:4px; color:var(--text); display:flex; justify-content:space-between; align-items:center; }
.palette-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:5px; }
.palette-btn{
  border:1px solid rgba(0,0,0,.12); border-radius:4px; padding:7px 2px;
  text-align:center; cursor:pointer; font-size:11px; font-weight:700; transition:.1s;
}
.palette-btn:hover{ transform:translateY(-1px); box-shadow:0 2px 4px rgba(0,0,0,.1); }
#history-suggests{ margin-top:8px; border-top:1px dashed var(--border); padding-top:7px; }

/* ===== 時数 ===== */
.jisu-table{ width:100%; border-collapse:collapse; font-size:11px; }
.jisu-table th{ background:var(--surface2); padding:4px 5px; text-align:center; font-size:10px; border:1px solid var(--border); }
.jisu-table td{ padding:3px 5px; border:1px solid var(--border); }
.jisu-table td:first-child{ font-weight:700; }
.jisu-table td.num{ text-align:right; font-variant-numeric:tabular-nums; }
.jisu-table td.num.warn{ color:#c05030; font-weight:700; }
.jisu-plan-input{
  width:44px; padding:2px 4px; border:1px solid var(--border2); border-radius:3px;
  font-size:11px; text-align:right; background:#faf8f5; font-family:inherit;
}
.jisu-plan-input:focus{ border-color:var(--accent); outline:none; }

#notice-pad{
  border:1px solid var(--border); border-radius:4px; padding:10px;
  height:140px; overflow:hidden; font-size:14px; outline:none; line-height:1.7;
  background:var(--bg); transition:.2s; width:100%;
}
#notice-pad:focus{ border-color:var(--accent); background:var(--surface); }

.action-btn{
  background:#fff; border:1px solid var(--border); padding:7px 8px;
  border-radius:4px; cursor:pointer; font-size:12px; font-weight:700;
  width:100%; margin-bottom:5px; transition:.1s; font-family:inherit; text-align:left;
}
.action-btn:hover{ background:var(--surface2); color:var(--accent); border-color:var(--accent); }

/* ===== モバイルバー ===== */
#mobile-bar{
  display:none; position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:var(--surface); border-top:2px solid var(--border2);
  padding:5px 8px; gap:5px; box-shadow:0 -2px 8px rgba(0,0,0,.1);
}
#mobile-bar button{
  flex:1; padding:9px 3px; border-radius:7px;
  border:1.5px solid var(--border2); background:var(--surface2);
  font-size:10px; font-weight:700; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:2px; font-family:inherit;
}
#mobile-bar button.active{ background:var(--accent); color:#fff; border-color:var(--accent); }
#mobile-bar button .bar-icon{ font-size:15px; line-height:1; }

#bottom-sheet{
  display:none; position:fixed; bottom:0; left:0; right:0; z-index:99;
  background:var(--surface); border-top:3px solid var(--border2);
  border-radius:14px 14px 0 0; max-height:55vh; overflow-y:auto;
  padding:10px 13px 80px; box-shadow:0 -4px 20px rgba(0,0,0,.15);
}
#bottom-sheet.open{ display:block; }
#bs-handle{ width:38px; height:4px; background:var(--border2); border-radius:2px; margin:0 auto 10px; }
#bs-overlay{ display:none; position:fixed; inset:0; z-index:98; background:rgba(0,0,0,.2); }
#bs-overlay.open{ display:block; }

#drop-zone{
  border:2px dashed var(--border2); border-radius:6px; padding:10px;
  text-align:center; font-size:11px; color:var(--subtext);
  cursor:pointer; transition:.2s; margin-top:6px; background:var(--bg);
}
#drop-zone:hover,#drop-zone.drag-over{ border-color:var(--accent); background:#fff5ee; color:var(--accent); }

@media (max-width:700px){
  #toolbar{ flex-wrap:nowrap; overflow-x:auto; }
  #toolbar > *:not(.app-title):not(#tb-print-btn):not(#tb-prev-btn):not(#sat-label){ display:none; }
  .wrapper{ flex-direction:column; }
  .right{ display:none !important; }
  .left{ padding:7px; }
  .page{ padding:7px 5px 85px; }
  #mobile-bar{ display:flex; }
  table{ min-width:450px; font-size:11px; }
  .cell-sub{ font-size:12px !important; }
  .cell-txt{ font-size:10px !important; min-height:24px !important; }
  th{ font-size:11px !important; padding:5px 2px !important; }
  .time-col{ width:22px !important; font-size:11px !important; }
}

/* =====================================================
   印刷 — A4縦 (余白2cm・視認性最大化・斜め字禁止)
   ===================================================== */
@media print {
  @page{ size:A4 portrait; margin:20mm; } /* 余白2cm */

  html,body{
    width:auto !important; 
    background:#fff !important; 
    color:#000 !important;
    font-family:'Noto Sans JP',sans-serif !important;
    -webkit-print-color-adjust:exact !important; 
    print-color-adjust:exact !important;
  }

  /* 非表示要素 */
  #toolbar, #tabbar, .right, .nav-arrow, #nav-dots,
  #mobile-bar, #bottom-sheet, #bs-overlay, #_toast, .th-badge.clear { display:none !important; }

  .page{ display:block !important; padding:0 !important; max-width:100% !important; }
  .wrapper{ display:block !important; }
  .left{ flex:none !important; width:100% !important; box-shadow:none !important; border:none !important; padding:0 !important; overflow:visible !important; }

  #week-nav{
    display:flex !important; justify-content:center; align-items:center;
    border:none !important; box-shadow:none !important; background:none !important;
    padding:0 !important; margin:0 0 6pt !important; min-height:0 !important;
  }
  #nav-center{ text-align:center; }
  #nav-week-label{ font-size:16pt !important; font-weight:900 !important; color:#000 !important; display:block; }
  #nav-date-label{ font-size:11pt !important; font-weight:700 !important; color:#000 !important; display:block; }

  #table-wrapper{ position:relative; }
  table{
    width:100%; table-layout:fixed; border-collapse:collapse;
    margin-bottom:6pt; page-break-inside:avoid;
  }

  thead tr th, th{
    background:#e0dbd2 !important; font-weight:900 !important; text-align:center;
    padding:4pt 2pt !important; font-size:11pt !important; color:#000 !important;
    border:1pt solid #222 !important; border-bottom:2pt solid #000 !important; height:20pt !important;
  }
  .time-col{
    background:#d4cfc6 !important; width:18pt !important; font-size:10pt !important;
    font-weight:900 !important; text-align:center; vertical-align:middle !important;
    color:#000 !important; border-right:2pt solid #000 !important; padding:1pt !important;
  }

  tr.class-row td{
    height:56pt !important; max-height:60pt !important;
    border:1pt solid #444 !important; padding:3pt 4pt !important;
    vertical-align:top; overflow:hidden;
  }
  tr.break-row td{
    height:15pt !important; max-height:16pt !important;
    border:1pt solid #444 !important; padding:1pt 3pt !important;
    background:#f4f0ea !important; overflow:hidden;
  }
  tr.break-row.items-row td{
    height:28pt !important; max-height:30pt !important; background:#faf8f4 !important;
  }

  /* テキストのスタイル（真っ黒・太字・斜め字禁止） */
  .cell-sub{
    font-size:12pt !important; font-weight:900 !important; line-height:1.2 !important;
    border-bottom:1pt solid #000 !important; padding-bottom:1pt !important;
    margin-bottom:2pt !important; color:#000 !important; letter-spacing:0;
    display:block; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
    font-style:normal !important;
  }
  .cell-txt{
    font-size:9.5pt !important; font-weight:900 !important; color:#000 !important; line-height:1.3 !important;
    min-height:0 !important; display:block; overflow:hidden;
    font-style:normal !important;
  }
  td.editable-cell{ padding:2pt 3pt !important; }
  td.active-cell{ box-shadow:none !important; background:inherit !important; }

  tr.break-row td.editable-cell{ padding:1pt 3pt !important; }
  tr.break-row .cell-txt{
    font-size:9pt !important; font-weight:900 !important; color:#000 !important;
    text-align:center !important; min-height:0 !important; line-height:1.2 !important;
    font-style:normal !important;
  }
  tr.break-row.items-row .cell-txt{ text-align:left !important; font-style:normal !important; font-size:10pt !important; }

  [contenteditable]:empty:before{ content:"" !important; }

  td.holiday-cell{ background:repeating-linear-gradient(135deg,#fff0f0,#fff0f0 4pt,#ffcccc 4pt,#ffcccc 6pt) !important; }
  td.furikyu-cell{ background:repeating-linear-gradient(135deg,#f0f0ff,#f0f0ff 4pt,#ccccff 4pt,#ccccff 6pt) !important; }

  .day-float-box{
    position:absolute !important; border-radius:4pt !important;
    border-width:1pt !important; border-color:#000 !important; box-shadow:none !important; padding:3pt 2pt !important;
  }
  .day-float-inner{ font-size:16pt !important; font-weight:900 !important; color:#000 !important; font-style:normal !important; }

  td.kekka-cell{ background:#c0b8b0 !important; position:relative !important; }
  td.kekka-cell::after{ background:repeating-linear-gradient(135deg,transparent,transparent 4pt,rgba(0,0,0,.15) 4pt,rgba(0,0,0,.15) 6pt) !important; }
  td.kekka-cell .cell-sub, td.kekka-cell .cell-txt{ color:#000 !important; font-style:normal !important; }

  #notice-wrap{
    display:block !important; margin-top:4pt; border:1.5pt solid #000 !important; border-radius:0; padding:6pt 8pt; page-break-inside:avoid;
  }
  #notice-wrap > div:first-child{ 
    font-size:11pt !important; font-weight:900 !important; color:#000 !important; 
    padding-bottom:2pt !important; margin-bottom:4pt !important; border-bottom:1pt solid #000 !important; 
  }
  #notice-pad{
    border:none !important; height:auto !important; min-height:100pt; padding:0 !important; 
    font-size:10.5pt !important; font-weight:900 !important; line-height:1.6 !important;
    color:#000 !important; background:transparent !important; overflow:hidden !important; font-style:normal !important;
  }

  *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
}
</style>
</head>
<body>

<div id="toolbar">
  <span class="app-title">📅 サクサク週案</span>
  <label>学年組</label><input type="text"   id="class-name" placeholder="3年1組" style="width:80px" onchange="saveMeta()">
  <label>月</label>   <input type="number" id="month-num"  min="1" max="12" onchange="saveMeta()">
  <label>週</label>   <input type="number" id="week-num"   min="1" max="6"  onchange="saveMeta()">
  <label>月曜</label> <input type="date"   id="monday-date" onchange="onDateChange()">
  <button class="tb-btn primary" onclick="renderWeek()">移動</button>
  <label id="sat-label"><input type="checkbox" id="sat-check" onchange="toggleSat()"> 土曜授業</label>
  <button class="tb-btn" id="mode-btn" onclick="toggleMode()">ひらがなモード</button>
  <div style="margin-left:auto; display:flex; gap:5px;">
    <button class="tb-btn" id="tb-prev-btn" onclick="copyPrev()">🔄 前週コピー</button>
    <button class="tb-btn" id="tb-print-btn" onclick="window.print()">🖨 印刷</button>
  </div>
</div>

<div id="tabbar">
  <button class="tab active" onclick="switchTab('main')">📅 週案</button>
  <button class="tab"        onclick="switchTab('jisu')">📊 時数管理</button>
</div>

<div class="page active" id="main-page">
  <div id="week-nav">
    <button class="nav-arrow" onclick="shiftWeek(-1)">‹</button>
    <div id="nav-center">
      <span id="nav-week-label">--年--組 --月--週案</span>
      <span id="nav-date-label">--/-- (月) 〜 --/-- (金)</span>
      <div class="nav-dots" id="nav-dots"></div>
    </div>
    <button class="nav-arrow" onclick="shiftWeek(1)">›</button>
  </div>

  <div class="wrapper">
    <div class="left" style="flex:3;">
      <div id="table-wrapper"><table id="table"></table></div>
      <div id="notice-wrap">
        <div style="font-size:12px;font-weight:700;color:var(--subtext);padding-bottom:5px;border-bottom:1px solid var(--border);margin-bottom:7px;">📢 おしらせ・連絡事項</div>
        <div id="notice-pad" contenteditable="true" placeholder="連絡・おしらせなど" oninput="saveNotice()"></div>
      </div>
    </div>

    <div class="right">
      <div class="card">
        <h3>🎨 教科入力</h3>
        <div class="palette-grid" id="palette"></div>
        <div id="history-suggests"></div>
      </div>

      <div class="card">
        <h3>📊 週時数</h3>
        <table class="jisu-table" id="jisu-week-table">
          <thead><tr><th>教科</th><th>今週</th><th>累計</th><th>残り</th><th>計画</th></tr></thead>
          <tbody id="jisu-week-body"></tbody>
        </table>
      </div>

      <div class="card">
        <h3>📌 ツール</h3>
        <label style="font-size:11px;display:flex;align-items:center;gap:4px;margin-bottom:6px;cursor:pointer;">
          <input type="checkbox" id="show-empty" onchange="toggleEmpty()"> 空欄を強調
        </label>
        <button class="action-btn" onclick="saveTemplate()">📥 基本時間割として登録</button>
        <button class="action-btn" onclick="loadTemplate()">📤 基本時間割を展開</button>
        <div style="display:flex;gap:5px;margin-bottom:5px;">
          <button class="action-btn" style="margin:0;" onclick="exportData()">⬇️ 保存</button>
          <button class="action-btn" style="margin:0;" onclick="document.getElementById('import-file').click()">⬆️ 復元</button>
          <input type="file" id="import-file" style="display:none" accept=".json" onchange="importData(event)">
        </div>
        <div id="drop-zone" onclick="document.getElementById('import-file').click()">📂 JSONをここにドロップ</div>
      </div>
    </div>
  </div>
</div>

<div class="page" id="jisu-page">
  <div style="font-family:'Kaisei Decol',serif;font-size:20px;color:var(--accent);font-weight:700;margin-bottom:14px;">📊 時数管理</div>
  <div id="jisu-full-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;"></div>
</div>

<div id="mobile-bar">
  <button onclick="mobileSheet('palette')" id="mb-palette"><span class="bar-icon">🎨</span>教科</button>
  <button onclick="mobileSheet('jisu')"    id="mb-jisu">   <span class="bar-icon">📊</span>時数</button>
  <button onclick="mobileSheet('tools')"   id="mb-tools">  <span class="bar-icon">📌</span>ツール</button>
  <button onclick="window.print()"                         ><span class="bar-icon">🖨</span>印刷</button>
</div>
<div id="bs-overlay" onclick="closeSheet()"></div>
<div id="bottom-sheet"><div id="bs-handle"></div><div id="bs-content"></div></div>

<script>
const BASE_DAYS = ["月","火","水","木","金"];
const ROWS = [
  { id:"朝",    type:"break", label:"朝の活動" },
  { id:"1",     type:"class" }, { id:"2", type:"class" },
  { id:"中",    type:"break", label:"中休み" },
  { id:"3",     type:"class" }, { id:"4", type:"class" },
  { id:"昼①",  type:"break", label:"給食" },
  { id:"昼②",  type:"break", label:"昼休み" },
  { id:"5",     type:"class" }, { id:"6", type:"class" },
  { id:"持物",  type:"break", label:"持ち物等" },
];
const BREAK_IDS = new Set(ROWS.filter(r=>r.type==="break").map(r=>r.id));

const SUBJECTS = [
  { name:"国語",  hira:"こくご",    color:"var(--kokugo)",    countAs:"国語"   },
  { name:"書写",  hira:"しょしゃ",  color:"var(--syasya)",    countAs:"国語"   },
  { name:"算数",  hira:"さんすう",  color:"var(--sansu)",     countAs:"算数"   },
  { name:"生活",  hira:"せいかつ",  color:"var(--seikatsu)",  countAs:"生活"   },
  { name:"理科",  hira:"りか",      color:"var(--rika)",      countAs:"理科"   },
  { name:"社会",  hira:"しゃかい",  color:"var(--shakai)",    countAs:"社会"   },
  { name:"音楽",  hira:"おんがく",  color:"var(--ongaku)",    countAs:"音楽"   },
  { name:"図工",  hira:"ずこう",    color:"var(--zukou)",     countAs:"図工"   },
  { name:"家庭科",hira:"かていか",  color:"var(--katei)",     countAs:"家庭科" },
  { name:"体育",  hira:"たいいく",  color:"var(--taiiku)",    countAs:"体育"   },
  { name:"道徳",  hira:"どうとく",  color:"var(--dotoku)",    countAs:"道徳"   },
  { name:"外国語",hira:"がいこくご",color:"var(--gaikokugo)", countAs:"外国語" },
  { name:"総合",  hira:"そうごう",  color:"var(--sogo)",      countAs:"総合"   },
  { name:"学活",  hira:"がっかつ",  color:"var(--gakkatsu)",  countAs:"学活"   },
  { name:"行事",  hira:"ぎょうじ",  color:"var(--gyoji)",     countAs:"行事"   },
  { name:"委員会",hira:"いいんかい",color:"var(--iinkai)",    countAs:"委員会" },
  { name:"クラブ",hira:"くらぶ",    color:"var(--club)",      countAs:"クラブ" },
  { name:"欠課",  hira:"けっか",    color:"var(--kekka)",     countAs:"欠課"   },
];
const SUBJ_ORDER = SUBJECTS.map(s=>s.countAs).filter((v,i,a)=>a.indexOf(v)===i);

let store = JSON.parse(localStorage.getItem("sakusaku_v1") || "{}");
let currentMonday = null;
let currentCell   = null;
let isHiragana    = false;

function save(){ localStorage.setItem("sakusaku_v1", JSON.stringify(store)); }
function ensureWeek(key){
  if(!store[key]) store[key]={ cells:{}, notice:"", hasSat:false, dayFlags:{}, dayLabels:{} };
  if(!store[key].dayFlags)  store[key].dayFlags={};
  if(!store[key].dayLabels) store[key].dayLabels={};
  return store[key];
}
function ensureJisu(){ if(!store["_jisu"]) store["_jisu"]={}; return store["_jisu"]; }

window.onload = () => {
  const meta = store["_meta"] || {};
  if(meta.className) document.getElementById("class-name").value = meta.className;
  if(meta.month)     document.getElementById("month-num").value  = meta.month;
  if(meta.week)      document.getElementById("week-num").value   = meta.week;

  const today = new Date();
  const dow   = today.getDay();
  const diff  = dow === 0 ? -6 : 1 - dow;
  const mon   = new Date(today); mon.setDate(today.getDate() + diff);
  document.getElementById("monday-date").value = mon.toISOString().slice(0,10);

  renderPalette(); onDateChange(); setupDrop();
};

function switchTab(id){
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",(i===0&&id==="main")||(i===1&&id==="jisu")));
  document.getElementById("main-page").classList.toggle("active", id==="main");
  document.getElementById("jisu-page").classList.toggle("active", id==="jisu");
  if(id==="jisu") renderJisuPage();
}

function saveMeta(){
  store["_meta"] = {
    className: document.getElementById("class-name").value,
    month:     document.getElementById("month-num").value,
    week:      document.getElementById("week-num").value,
  };
  save(); updateNav();
}

function onDateChange(){
  currentMonday = document.getElementById("monday-date").value;
  if(!currentMonday) return;
  const d = new Date(currentMonday);
  document.getElementById("month-num").value = d.getMonth()+1;
  document.getElementById("week-num").value  = Math.ceil(d.getDate()/7);
  saveMeta(); renderWeek();
}

function shiftWeek(dir){
  if(!currentMonday) return;
  const d = new Date(currentMonday); d.setDate(d.getDate() + dir*7);
  document.getElementById("monday-date").value = d.toISOString().slice(0,10);
  onDateChange();
}

function toggleSat(){
  if(!currentMonday) return;
  ensureWeek(currentMonday).hasSat = document.getElementById("sat-check").checked;
  save(); renderWeek(); toast("保存しました",1400);
}

function updateNav(){
  const meta = store["_meta"] || {};
  document.getElementById("nav-week-label").textContent = `${meta.className||"--年--組"} ${meta.month||"--"}月${meta.week||"--"}週案`;

  if(currentMonday){
    const s = new Date(currentMonday); const e = new Date(currentMonday);
    const hasSat = store[currentMonday]?.hasSat;
    e.setDate(e.getDate() + (hasSat?5:4));
    document.getElementById("nav-date-label").textContent = `${s.getMonth()+1}/${s.getDate()}(月) 〜 ${e.getMonth()+1}/${e.getDate()}(${hasSat?"土":"金"})`;
  }

  const dots = document.getElementById("nav-dots"); dots.innerHTML="";
  for(let i=-3; i<=3; i++){
    const d = new Date(currentMonday); d.setDate(d.getDate()+i*7);
    const iso = d.toISOString().slice(0,10);
    const dot = document.createElement("div");
    const hasData = store[iso] && Object.values(store[iso].cells||{}).some(c=>c.sub||c.txt);
    dot.className = "nav-dot" + (i===0?" active":"") + (hasData&&i!==0?" has-data":"");
    dot.onclick = (()=>{ const k=iso; return ()=>{ document.getElementById("monday-date").value=k; onDateChange(); }; })();
    dots.appendChild(dot);
  }
}

function cycleFlag(day){
  const w = ensureWeek(currentMonday);
  const cur = w.dayFlags[day] || null;
  if      (!cur)              w.dayFlags[day] = "holiday";
  else if (cur==="holiday")   w.dayFlags[day] = "furikyu";
  else                        delete w.dayFlags[day];
  save(); renderWeek(); toast("保存しました",1200);
}

function editDayLabel(e, day){
  e.preventDefault();
  const w = ensureWeek(currentMonday);
  const next = prompt(`${day}曜日の名前（空欄でデフォルト）`, w.dayLabels[day]||"");
  if(next !== null){ w.dayLabels[day]=next; save(); renderWeek(); }
}

function renderWeek(){
  currentMonday = document.getElementById("monday-date").value;
  if(!currentMonday) return;
  const w = ensureWeek(currentMonday);

  document.getElementById("notice-pad").innerHTML = w.notice||"";
  document.getElementById("sat-check").checked    = w.hasSat||false;
  adjustNotice(); updateNav();

  const days = w.hasSat ? [...BASE_DAYS,"土"] : [...BASE_DAYS];
  const table = document.getElementById("table");
  let html = "<tr><th class='time-col'></th>";

  days.forEach((d,i)=>{
    const dt = new Date(currentMonday); dt.setDate(dt.getDate()+i);
    const flag = w.dayFlags[d]||null;
    const cls  = flag ? `${flag}-col` : "";
    const dStr = `${dt.getMonth()+1}/${dt.getDate()}(${d})`;
    let badge;
    if      (flag==="holiday") badge=`<span class="th-badge holiday" onclick="cycleFlag('${d}')" oncontextmenu="editDayLabel(event,'${d}')">祝</span>`;
    else if (flag==="furikyu") badge=`<span class="th-badge furikyu" onclick="cycleFlag('${d}')" oncontextmenu="editDayLabel(event,'${d}')">振</span>`;
    else                       badge=`<span class="th-badge clear"   onclick="cycleFlag('${d}')">＋</span>`;
    html += `<th class="${cls}">${dStr} ${badge}</th>`;
  });
  html += "</tr>";

  ROWS.forEach(r=>{
    const isBreak = r.type==="break"; const isItems = r.id==="持物";
    const rowCls  = isBreak ? ("break-row" + (isItems?" items-row":"")) : "class-row";
    html += `<tr class="${rowCls}"><td class="time-col">${r.id}</td>`;
    days.forEach(d=>{
      const key  = `${r.id}_${d}`; const cell = w.cells[key]||{sub:"",txt:""};
      const flag = w.dayFlags[d]||null;

      if(flag==="holiday"||flag==="furikyu"){
        html += `<td class="editable-cell ${flag}-cell" style="border-top:none;border-bottom:none;"></td>`;
        return;
      }

      const isKekka = cell.sub && (cell.sub.includes("欠課")||cell.sub.includes("けっか"));
      const kCls    = isKekka ? " kekka-cell" : "";
      const ph      = isItems ? "持ち物・連絡等" : r.label;

      if(isBreak){
        html += `<td class="editable-cell break-cell${kCls}${isItems?" items-cell":""}" data-key="${key}" data-type="break" style="position:relative;">
          <div class="cell-txt" contenteditable="true" placeholder="${ph}" onfocus="setActive(this)" onblur="saveHist('${key}')" oninput="onInput('${key}')" onkeydown="onKey(event,'txt')">${cell.txt||cell.sub||""}</div>
        </td>`;
      } else {
        html += `<td class="editable-cell class-cell${kCls}" data-key="${key}" data-type="class" onclick="setActive(this)" style="position:relative;">
          <div class="cell-sub" contenteditable="true" placeholder="教科" onfocus="setActive(this)" onblur="saveHist('${key}')" oninput="onInput('${key}')" onkeydown="onKey(event,'sub')">${cell.sub}</div>
          <div class="cell-txt" contenteditable="true" placeholder="単元・内容" onfocus="setActive(this)" onblur="saveHist('${key}')" oninput="onInput('${key}')" onkeydown="onKey(event,'txt')">${cell.txt}</div>
        </td>`;
      }
    });
    html += "</tr>";
  });

  table.innerHTML = html;
  document.querySelectorAll("td.class-cell").forEach(td=>applyColor(td));
  requestAnimationFrame(()=>renderFloats(w, days));
  renderJisuWeek();
}

function renderFloats(w, days){
  document.querySelectorAll(".day-float-box").forEach(el=>el.remove());
  const wrapper = document.getElementById("table-wrapper");
  const table   = document.getElementById("table");
  const wr = wrapper.getBoundingClientRect();

  days.forEach((d,ci)=>{
    const flag = w.dayFlags[d]||null;
    if(flag!=="holiday"&&flag!=="furikyu") return;
    const th = table.querySelector("tr").children[ci+1];
    if(!th) return;
    const thr  = th.getBoundingClientRect(); const tbr  = table.getBoundingClientRect();
    const left = thr.left - wr.left; const top  = thr.bottom - wr.top;
    const h    = tbr.bottom - wr.top - top;
    const label = w.dayLabels[d] || (flag==="holiday"?"祝日":"振休");

    const box = document.createElement("div");
    box.className = `day-float-box ${flag}-box`;
    box.style.cssText = `left:${left+4}px;width:${thr.width-8}px;top:${top+4}px;height:${h-8}px;`;

    const inner = document.createElement("div");
    inner.className       = "day-float-inner";
    inner.contentEditable = "true";
    inner.textContent     = label;
    inner.addEventListener("input",()=>{ w.dayLabels[d]=inner.textContent.trim(); save(); toast("保存しました",1200); });
    inner.addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();inner.blur();} });
    box.appendChild(inner); wrapper.appendChild(box);
  });
}

function setActive(el){
  document.querySelectorAll(".active-cell").forEach(e=>e.classList.remove("active-cell"));
  const td = el.tagName==="TD" ? el : el.closest("td");
  if(!td) return; td.classList.add("active-cell"); currentCell = td; renderSuggestions();
}

function onKey(e, type){
  if(e.key!=="Enter") return;
  if(e.shiftKey) return;
  e.preventDefault();
  if(type==="sub"){
    const txt = e.target.closest("td").querySelector(".cell-txt");
    if(txt) txt.focus();
  } else {
    const td  = e.target.closest("td"); const tr  = td.closest("tr");
    const ci  = Array.from(tr.children).indexOf(td);
    let nx    = tr.nextElementSibling;
    while(nx){
      const c = nx.children[ci];
      if(c&&c.classList.contains("editable-cell")&&!c.classList.contains("holiday-cell")&&!c.classList.contains("furikyu-cell")){
        const div = c.querySelector(".cell-sub")||c.querySelector(".cell-txt");
        if(div) div.focus(); break;
      }
      nx = nx.nextElementSibling;
    }
  }
}

function onInput(key){
  const w  = store[currentMonday]; const td = document.querySelector(`td[data-key="${key}"]`);
  if(!td||!w) return;
  const s = td.querySelector(".cell-sub"); const t = td.querySelector(".cell-txt");
  w.cells[key] = { sub:s?s.innerText:"", txt:t?t.innerText:"" };
  save(); if(s) applyColor(td); renderJisuWeek(); renderSuggestions(); toast("✓",900);
}

function applyColor(td){
  const sub = td.querySelector(".cell-sub").innerText;
  if(td.classList.contains("holiday-cell")||td.classList.contains("furikyu-cell")) return;
  const isKekka = sub.includes("欠課")||sub.includes("けっか");
  td.classList.toggle("kekka-cell", isKekka);
  if(isKekka){ td.style.backgroundColor=""; return; }
  td.style.backgroundColor="";
  for(const s of SUBJECTS){ if(sub.includes(s.name)||sub.includes(s.hira)){ td.style.backgroundColor = s.color; break; } }
}

function insertSubject(name){
  if(!currentCell){ toast("マスを選んでください"); return; }
  if(currentCell.dataset.type==="break"){ toast("休み時間枠には直接入力してください"); return; }
  const sub = currentCell.querySelector(".cell-sub");
  const txt = currentCell.querySelector(".cell-txt");
  sub.innerText = name; if(!name) txt.innerText="";
  onInput(currentCell.dataset.key);
  if(name) txt.focus();
}

function saveHist(key){
  const td = document.querySelector(`td[data-key="${key}"]`);
  if(!td||td.dataset.type==="break") return;
  const sub = td.querySelector(".cell-sub").innerText.trim();
  const txt = td.querySelector(".cell-txt").innerText.trim();
  if(!sub||!txt) return;
  if(!store["_hist"])      store["_hist"]={};
  if(!store["_hist"][sub]) store["_hist"][sub]=[];
  let h = store["_hist"][sub].filter(x=>x!==txt);
  h.unshift(txt); if(h.length>20) h.pop();
  store["_hist"][sub]=h; save();
}

function renderSuggestions(){
  const c = document.getElementById("history-suggests"); c.innerHTML="";
  if(!currentCell||currentCell.dataset.type==="break"){ c.innerHTML="<div style='color:#bbb;font-size:11px;padding:3px;'>マスを選ぶと履歴が出ます</div>"; return; }
  const sub = (currentCell.querySelector(".cell-sub")||{}).innerText?.trim()||"";
  const h   = store["_hist"]?.[sub];
  if(!h?.length){ c.innerHTML=`<div style='color:#bbb;font-size:11px;padding:3px;'>「${sub||"教科"}」の履歴なし</div>`; return; }
  let html=`<div style='font-size:10px;color:var(--subtext);font-weight:700;margin-bottom:5px;'>💡 「${sub}」の履歴</div><div style='display:flex;flex-wrap:wrap;gap:4px;'>`;
  h.slice(0,12).forEach(t=>{
    const s=t.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
    html+=`<div class="palette-btn" style="background:var(--surface2);padding:5px;font-size:10px;" onclick="insertHist('${sub}','${s}')">${t.length>14?t.slice(0,14)+"…":t}</div>`;
  });
  c.innerHTML=html+"</div>";
}

function insertHist(sub, txt){
  if(!currentCell) return;
  const s=currentCell.querySelector(".cell-sub"); const t=currentCell.querySelector(".cell-txt");
  if(s) s.innerText=sub; if(t) t.innerText=txt;
  onInput(currentCell.dataset.key);
}

function renderPalette(){
  const p = document.getElementById("palette"); p.innerHTML="";
  SUBJECTS.forEach(s=>{
    const label = isHiragana ? s.hira : s.name; const isK = s.name==="欠課";
    const style = isK ? `background:repeating-linear-gradient(135deg,#ddd,#ddd 5px,#bbb 5px,#bbb 7px);color:#666;` : `background:${s.color};`;
    p.innerHTML+=`<div class="palette-btn" style="${style}" onclick="insertSubject('${label}')">${label}</div>`;
  });
  p.innerHTML+=`<div class="palette-btn" style="background:#eee;" onclick="insertSubject('')">消去</div>`;
}

function toggleMode(){ isHiragana=!isHiragana; document.getElementById("mode-btn").textContent=isHiragana?"漢字モード":"ひらがなモード"; renderPalette(); renderWeek(); }

function countThisWeek(){
  const w = store[currentMonday]; const cnt={};
  if(!w) return cnt;
  for(const key in w.cells){
    const rid = key.split("_")[0]; if(BREAK_IDS.has(rid)) continue;
    const sub = w.cells[key].sub; if(!sub) continue;
    const s = SUBJECTS.find(x=>sub.includes(x.name)||sub.includes(x.hira));
    if(s){ const base=s.countAs; cnt[base]=(cnt[base]||0)+1; }
  }
  return cnt;
}

function countAllWeeks(){
  const cnt={};
  for(const dateKey in store){
    if(dateKey.startsWith("_")) continue;
    const w = store[dateKey]; if(!w?.cells) continue;
    for(const key in w.cells){
      const rid=key.split("_")[0]; if(BREAK_IDS.has(rid)) continue;
      const sub=w.cells[key].sub; if(!sub) continue;
      const s=SUBJECTS.find(x=>sub.includes(x.name)||sub.includes(x.hira));
      if(s){ const base=s.countAs; cnt[base]=(cnt[base]||0)+1; }
    }
  }
  return cnt;
}

function renderJisuWeek(){
  const tbody = document.getElementById("jisu-week-body"); if(!tbody) return;
  const thisW = countThisWeek(); const allW = countAllWeeks(); const jisu = ensureJisu();
  const used = Array.from(new Set([...Object.keys(thisW),...Object.keys(allW)])).filter(b=>SUBJ_ORDER.includes(b)).sort((a,b)=>SUBJ_ORDER.indexOf(a)-SUBJ_ORDER.indexOf(b));

  let html="";
  used.forEach(base=>{
    const tw = thisW[base]||0; const all= allW[base]||0; const plan=(jisu[base]?.plan)||0;
    const rem = plan>0 ? plan-all : null; const warnRem = rem!==null && rem<0;
    html+=`<tr><td>${base}</td><td class="num">${tw}</td><td class="num">${all}</td><td class="num${warnRem?" warn":""}">${rem!==null?(warnRem?"超過":"あと"+rem):"—"}</td><td><input class="jisu-plan-input" type="number" min="0" value="${plan}" onchange="setPlan('${base}',this.value)" title="計画時数を入力"></td></tr>`;
  });
  tbody.innerHTML = html||`<tr><td colspan="5" style="text-align:center;color:#bbb;font-size:11px;padding:8px;">教科を入力すると集計されます</td></tr>`;
}

function setPlan(base, val){
  const jisu = ensureJisu();
  if(!jisu[base]) jisu[base]={plan:0};
  jisu[base].plan = parseInt(val)||0;
  save(); renderJisuWeek(); renderJisuPage();
}

function renderJisuPage(){
  const allW = countAllWeeks(); const jisu = ensureJisu();
  const grid = document.getElementById("jisu-full-grid"); if(!grid) return; grid.innerHTML="";

  const used = SUBJ_ORDER.filter(base=>allW[base]||(jisu[base]?.plan));
  if(!used.length){ grid.innerHTML="<div style='color:#aaa;font-size:13px;'>週案に教科を入力すると自動集計されます</div>"; return; }

  used.forEach(base=>{
    const all = allW[base]||0; const plan = jisu[base]?.plan||0;
    const rem = plan>0 ? plan-all : null; const pct = plan>0 ? Math.min(100,Math.round(all/plan*100)) : 0;
    const s = SUBJECTS.find(x=>x.countAs===base)||{color:"var(--other)",name:base};
    const warn = rem!==null&&rem<0;

    const card=document.createElement("div");
    card.style.cssText=`background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 4px rgba(100,70,30,.08);`;
    card.innerHTML=`<div style="background:${s.color};padding:8px 12px;font-weight:900;font-size:14px;border-bottom:1px solid var(--border);">${base}</div>
      <div style="padding:12px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;">
          <span>実施累計: <strong style="font-size:18px;">${all}</strong></span>
          <span style="color:var(--subtext)">計画: <strong>${plan||"未設定"}</strong></span>
        </div>
        <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:6px;">
          <div style="height:100%;width:${pct}%;background:${warn?"#e05030":"var(--accent)"};transition:.3s;"></div>
        </div>
        <div style="text-align:right;font-size:11px;font-weight:700;color:${warn?"#e05030":"var(--subtext)"}">${rem!==null?(warn?"超過 "+Math.abs(rem):"残り "+rem):"計画未設定"}</div>
      </div>`;
    grid.appendChild(card);
  });
}

function saveNotice(){
  if(!currentMonday) return;
  store[currentMonday].notice = document.getElementById("notice-pad").innerHTML;
  save(); adjustNotice();
}

function adjustNotice(){
  const pad = document.getElementById("notice-pad");
  pad.style.height = "auto";
  pad.style.height = (pad.scrollHeight + 5) + "px";
}

function toggleEmpty(){
  const show = document.getElementById("show-empty").checked;
  document.querySelectorAll("td.class-cell").forEach(td=>{
    if(td.classList.contains("holiday-cell")||td.classList.contains("furikyu-cell")) return;
    const s=td.querySelector(".cell-sub").innerText.trim();
    td.classList.toggle("cell-empty", show && !s);
  });
}

function copyPrev(){
  if(!currentMonday) return;
  if(!confirm("前週の【教科】のみをコピーしますか？（現在の内容は上書きされます）")) return;
  const d = new Date(currentMonday); d.setDate(d.getDate()-7);
  const prevKey = d.toISOString().slice(0,10);
  const pw = store[prevKey];
  if(!pw||!pw.cells){ toast("前週のデータがありません"); return; }
  const cw = ensureWeek(currentMonday);
  for(let k in pw.cells){
    if(k.startsWith("朝_")||k.startsWith("中_")||k.startsWith("昼①_")||k.startsWith("昼②_")||k.startsWith("持物_")) continue;
    if(pw.cells[k].sub) cw.cells[k] = { sub:pw.cells[k].sub, txt:"" };
  }
  save(); renderWeek(); toast("前週から教科をコピーしました");
}

function saveTemplate(){
  if(!currentMonday) return;
  if(!confirm("現在の週を【基本時間割】として登録しますか？")) return;
  const w = store[currentMonday];
  const tpl = {};
  for(let k in w.cells){
    if(k.startsWith("朝_")||k.startsWith("中_")||k.startsWith("昼①_")||k.startsWith("昼②_")||k.startsWith("持物_")) continue;
    if(w.cells[k].sub) tpl[k] = w.cells[k].sub;
  }
  store["_template"] = tpl; save(); toast("基本時間割を登録しました");
}

function loadTemplate(){
  if(!currentMonday) return;
  const tpl = store["_template"];
  if(!tpl){ toast("基本時間割が登録されていません"); return; }
  if(!confirm("基本時間割を展開しますか？（現在のマスは上書きされます）")) return;
  const w = ensureWeek(currentMonday);
  for(let k in tpl){ w.cells[k] = { sub:tpl[k], txt:w.cells[k]?.txt||"" }; }
  save(); renderWeek(); toast("基本時間割を展開しました");
}

function exportData(){
  const j = JSON.stringify(store); const b = new Blob([j],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(b); a.download = `週案_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); toast("保存しました");
}

function importData(e){
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e=>{
    try{ const d=JSON.parse(e.target.result); store=d; save(); location.reload(); }
    catch(err){ alert("ファイルの読み込みに失敗しました"); }
  };
  r.readAsText(f);
}

function setupDrop(){
  const dz = document.getElementById("drop-zone");
  dz.addEventListener("dragover",e=>{ e.preventDefault(); dz.classList.add("drag-over"); });
  dz.addEventListener("dragleave",()=>{ dz.classList.remove("drag-over"); });
  dz.addEventListener("drop",e=>{
    e.preventDefault(); dz.classList.remove("drag-over");
    const f=e.dataTransfer.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      try{ const d=JSON.parse(ev.target.result); store=d; save(); location.reload(); }
      catch(err){ alert("ファイルの読み込みに失敗しました"); }
    };
    r.readAsText(f);
  });
}

function mobileSheet(id){
  document.querySelectorAll("#mobile-bar button").forEach(b=>b.classList.remove("active"));
  document.getElementById("mb-"+id).classList.add("active");
  const c = document.getElementById("bs-content"); c.innerHTML="";

  if(id==="palette"){
    c.innerHTML=`<div class="card" style="border:none;box-shadow:none;padding:0;"><h3 style="margin-top:0;">🎨 教科入力</h3><div class="palette-grid" id="mb-palette-grid"></div></div>`;
    const p = document.getElementById("mb-palette-grid");
    SUBJECTS.forEach(s=>{
      const label = isHiragana?s.hira:s.name; const isK=s.name==="欠課";
      const style = isK?`background:repeating-linear-gradient(135deg,#ddd,#ddd 5px,#bbb 5px,#bbb 7px);color:#666;`:`background:${s.color};`;
      p.innerHTML+=`<div class="palette-btn" style="${style}" onclick="insertSubject('${label}');closeSheet();">${label}</div>`;
    });
    p.innerHTML+=`<div class="palette-btn" style="background:#eee;" onclick="insertSubject('');closeSheet();">消去</div>`;
  }
  else if(id==="jisu"){
    switchTab('jisu'); closeSheet(); return;
  }
  else if(id==="tools"){
    c.innerHTML=`
      <button class="action-btn" onclick="saveTemplate();closeSheet();">📥 基本を登録</button>
      <button class="action-btn" onclick="loadTemplate();closeSheet();">📤 基本を展開</button>
      <button class="action-btn" onclick="exportData();closeSheet();">⬇️ データを保存</button>
      <div class="action-btn" style="text-align:center;" onclick="document.getElementById('import-file').click();">📂 JSONを選択</div>`;
  }

  document.getElementById("bottom-sheet").classList.add("open");
  document.getElementById("bs-overlay").classList.add("open");
}

function closeSheet(){
  document.getElementById("bottom-sheet").classList.remove("open");
  document.getElementById("bs-overlay").classList.remove("open");
  ["palette","jisu","tools"].forEach(id=>document.getElementById("mb-"+id)?.classList.remove("active"));
}

function toast(msg, ms=2200){
  let el=document.getElementById("_toast");
  if(!el){
    el=document.createElement("div"); el.id="_toast";
    el.style.cssText="position:fixed;bottom:22px;right:18px;background:var(--accent);color:#fff;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:700;box-shadow:0 4px 12px rgba(0,0,0,.18);transition:opacity .3s,transform .3s;z-index:1000;opacity:0;transform:translateY(10px);pointer-events:none;";
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity="1"; el.style.transform="translateY(0)";
  clearTimeout(el.timer);
  el.timer = setTimeout(()=>{ el.style.opacity="0"; el.style.transform="translateY(10px)"; }, ms);
}
</script>
