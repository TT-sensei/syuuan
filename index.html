<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ベストミックス週案作成アプリ（自動日付・時数管理付き）</title>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#fdf8f2; --surface:#fffcf7; --surface2:#f5efe6;
    --border:#e0d5c5; --border2:#ccc0ad;
    --text:#3d3228; --subtext:#8a7a6a;
    --accent:#c07850; --accent2:#e8a878;
    --kokugo:#fff1d6; --sansu:#ddeeff; --rika:#ddf4e4; --shakai:#ffe8e8;
    --taiiku:#ffe8cc; --ongaku:#ecdeff; --zukou:#ffeedd; --seikatsu:#fff8d6;
    --dotoku:#e8f8ee; --gaikokugo:#d6f0ff; --sogo:#ffe6f5; --gakkatsu:#eee8ff; --other:#f5f2ee;
    --radius:10px; --shadow:0 2px 12px rgba(100,70,30,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; min-height: 100vh; padding: 16px; }

  /* ツールバー */
  #toolbar {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 14px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 10px;
    margin-bottom: 14px; box-shadow: var(--shadow); max-width: 1000px; margin-left: auto; margin-right: auto;
  }
  .tb-left { display: flex; align-items: center; gap: 8px; }
  .tb-input { border: 1.5px solid var(--border2); padding: 6px 8px; border-radius: 6px; font-family: inherit; font-size: 13px; font-weight: bold; color: var(--text); background: white; cursor: pointer;}
  .tb-btn {
    padding: 8px 16px; border-radius: 6px; border: 1.5px solid var(--border2);
    background: var(--surface); color: var(--text); cursor: pointer; font-size: 13px; font-weight: 700; transition: 0.15s;
  }
  .tb-btn:hover { background: var(--surface2); }
  .tb-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .tb-btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .tb-btn.icon-btn { padding: 8px 12px; }

  /* メインコンテンツ（A4印刷領域） */
  .page { max-width: 1000px; margin: 0 auto; background: var(--surface); border: 2px solid var(--border2); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  
  #week-title-bar {
    display: flex; align-items: baseline; padding: 12px 16px;
    background: linear-gradient(135deg, #fdf0e0, #fce8d2); border-bottom: 2px solid var(--border2); gap: 12px;
  }
  .class-input { font-size: 18px; font-weight: bold; width: 100px; border: none; background: transparent; border-bottom: 2px dashed var(--accent); color: var(--text); outline: none; text-align: center; font-family: inherit; transition: 0.2s;}
  .class-input:focus { border-bottom-color: var(--accent2); background: rgba(255,255,255,0.5); }
  
  #title-text { font-family: 'Kaisei Decol', serif; font-size: 22px; font-weight: 700; color: var(--accent); flex: 1; text-align: center; }
  #date-range { font-size: 14px; color: var(--subtext); font-weight: bold; width: 140px; text-align: right; }

  table { border-collapse: collapse; width: 100%; table-layout: fixed; }
  th, td { border: 1px solid var(--border); vertical-align: top; }
  
  thead th { background: var(--surface2); text-align: center; padding: 8px 4px; border-bottom: 2px solid var(--border2); }
  .day-youbi { font-size: 12px; color: var(--subtext); display: block; font-weight: 700;}
  .day-date { font-size: 16px; font-weight: 900; display: block; }

  .time-col { background: var(--surface2); text-align: center; font-weight: 700; font-size: 12px; vertical-align: middle; width: 40px; color: var(--subtext); border-right: 2px solid var(--border2); }
  
  .cell-td { cursor: pointer; transition: background 0.15s; background: white; height: 75px; position: relative; }
  .cell-td:hover { box-shadow: inset 0 0 0 2px var(--accent2); z-index: 2; }
  
  .cell-sub-bar { padding: 4px 6px; font-weight: 700; font-size: 12px; border-bottom: 1px solid rgba(0,0,0,0.07); min-height: 24px; }
  .cell-content { padding: 4px 6px; font-size: 11.5px; color: #5a4a3a; white-space: pre-wrap; line-height: 1.4; }

  /* 連絡欄 */
  #notice-wrap { border-top: 2px solid var(--border2); }
  .section-head { background: var(--surface2); padding: 8px 14px; font-weight: 700; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--subtext); }
  #notice-area { width: 100%; min-height: 100px; border: none; outline: none; padding: 10px 14px; font-size: 13px; font-family: inherit; line-height: 1.6; background: white; color: var(--text); resize: vertical; }

  /* 時数管理（A4印刷時は非表示） */
  #jisu-wrap { border-top: 2px solid var(--border2); background: var(--surface); }
  .jisu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; padding: 16px; }
  .jisu-card { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.03); }
  .jisu-card-title { font-weight: 700; font-size: 14px; border-bottom: 2px solid; padding-bottom: 6px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
  .jisu-card-title span.week-count { color: var(--accent); font-size: 11.5px; background: var(--surface2); padding: 3px 8px; border-radius: 12px; }
  .jisu-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin-bottom: 6px; color: var(--subtext); font-weight: 500;}
  .jisu-row input { width: 56px; text-align: right; border: 1px solid var(--border2); border-radius: 4px; padding: 3px 6px; font-size: 13px; font-family: inherit; transition: 0.2s; }
  .jisu-row input:focus { border-color: var(--accent); outline: none; }
  .jisu-bar-bg { background: var(--surface2); height: 8px; border-radius: 4px; overflow: hidden; margin-top: 10px; }
  .jisu-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
  .jisu-total { text-align: right; font-weight: 900; font-size: 14px; margin-top: 6px; color: var(--text); }

  /* モーダル */
  #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
  #modal-overlay.open { display: flex; }
  #modal { background: var(--surface); border-radius: 12px; width: 400px; max-width: 95vw; box-shadow: 0 8px 40px rgba(0,0,0,0.2); overflow: hidden; border: 1px solid var(--border2); }
  #modal-header { background: linear-gradient(135deg, #fdf0e0, #fce8d2); padding: 12px 16px; font-weight: 700; font-size: 14px; color: var(--accent); border-bottom: 1px solid var(--border); }
  #modal-body { padding: 16px; }
  .modal-label { display: block; font-size: 12px; font-weight: 700; color: var(--subtext); margin-bottom: 6px; margin-top: 12px; }
  #subject-presets { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .preset-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(0,0,0,0.1); font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.1s; background: white; }
  .preset-btn:hover { opacity: 0.8; transform: scale(1.05); }
  
  #modal-subject, #modal-content { width: 100%; padding: 8px; border: 1.5px solid var(--border2); border-radius: 6px; font-size: 13px; font-family: inherit; background: white; }
  #modal-content { height: 100px; resize: vertical; }
  #modal-subject:focus, #modal-content:focus { outline: 2px solid var(--accent); border-color: transparent; }
  
  #modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 12px 16px; background: var(--surface2); border-top: 1px solid var(--border); }

  /* =============================================
     印刷スタイル — A4縦1ページに最適化
     ============================================= */
  @media print {
    @page { size: A4 portrait; margin: 10mm 8mm; }
    body { background: white !important; color: black !important; padding: 0; }
    
    #toolbar, #modal-overlay, .no-print { display: none !important; }
    
    .page { max-width: 100%; box-shadow: none; border: 1px solid #000; border-radius: 0; margin: 0; }
    
    #week-title-bar { background: transparent; border-bottom: 1px solid #000; padding: 6pt 10pt; align-items: center; }
    .class-input { border: none !important; width: 80px !important; color: #000 !important; font-size: 14pt !important; text-align: left; }
    #title-text { color: #000 !important; font-size: 16pt !important; }
    #date-range { color: #000 !important; font-size: 12pt !important; }

    table { border-collapse: collapse; margin-bottom: 0; }
    th, td { border: 1px solid #555 !important; }
    thead th { background: #eee !important; color: #000 !important; padding: 4pt; }
    .day-youbi { font-size: 10pt; display: inline; margin-right: 4pt; }
    .day-date { font-size: 12pt; display: inline; }
    .time-col { background: #eee !important; color: #000 !important; width: 25pt !important; font-size: 10pt; }
    
    .cell-td { height: auto !important; min-height: 55pt; background: transparent !important; }
    .cell-sub-bar { border-bottom: 1px solid #aaa; font-size: 10pt; padding: 2pt 4pt; color: #000 !important; background: transparent !important; }
    .cell-content { font-size: 9pt; padding: 2pt 4pt; line-height: 1.2; color: #000; }
    
    #notice-wrap { border-top: 1px solid #555; }
    .section-head { background: #eee !important; color: #000 !important; padding: 4pt 8pt; font-size: 10pt; border-bottom: 1px solid #555; }
    #notice-area { height: auto !important; min-height: 50pt; padding: 6pt 8pt; font-size: 10pt; resize: none; overflow: hidden; border: none; }
    
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<div id="toolbar">
  <div class="tb-left">
    <span style="font-family: 'Kaisei Decol', serif; font-size: 18px; font-weight: bold; color: var(--accent); margin-right: 10px;">サクサク週案</span>
    <button class="tb-btn icon-btn" onclick="shiftWeek(-1)" title="先週へ">◀</button>
    <input type="date" id="start-date" class="tb-input" onchange="changeDate(true)" title="月曜日を自動計算します">
    <button class="tb-btn icon-btn" onclick="shiftWeek(1)" title="来週へ">▶</button>
  </div>
  <button class="tb-btn primary" onclick="window.print()">🖨️ A4印刷する</button>
</div>

<div class="page" id="main-page">
  <div id="week-title-bar">
    <div style="width: 140px;">
      <input type="text" id="class-name" placeholder="○年○組" class="class-input" oninput="saveState()">
    </div>
    <div id="title-text">--月 第--週 週間指導計画</div>
    <div id="date-range">--/-- 〜 --/--</div>
  </div>

  <table id="schedule-table">
    <thead>
      <tr>
        <th class="time-col"></th>
        <th><span class="day-youbi">月</span><span class="day-date" id="date-0">--</span></th>
        <th><span class="day-youbi">火</span><span class="day-date" id="date-1">--</span></th>
        <th><span class="day-youbi">水</span><span class="day-date" id="date-2">--</span></th>
        <th><span class="day-youbi">木</span><span class="day-date" id="date-3">--</span></th>
        <th><span class="day-youbi">金</span><span class="day-date" id="date-4">--</span></th>
      </tr>
    </thead>
    <tbody id="schedule-body">
      </tbody>
  </table>

  <div id="notice-wrap">
    <div class="section-head">📝 連絡事項・メモ</div>
    <textarea id="notice-area" placeholder="今週の連絡事項や準備物などを入力してください..." oninput="saveState()"></textarea>
  </div>

  <div id="jisu-wrap" class="no-print">
    <div class="section-head">📈 時数管理（印刷されません）</div>
    <div id="jisu-grid" class="jisu-grid">
      </div>
  </div>
</div>

<div id="modal-overlay" onclick="if(event.target===this) closeModal()">
  <div id="modal">
    <div id="modal-header">✏️ 内容の編集</div>
    <div id="modal-body">
      <div class="modal-label">教科を選ぶ</div>
      <div id="subject-presets"></div>
      
      <div class="modal-label">教科・領域名</div>
      <input type="text" id="modal-subject" placeholder="国語、算数など">
      
      <div class="modal-label">学習内容・めあて</div>
      <textarea id="modal-content" placeholder="学習内容を入力"></textarea>
    </div>
    <div id="modal-footer">
      <button class="tb-btn" onclick="clearCell()">クリア</button>
      <button class="tb-btn" onclick="closeModal()">キャンセル</button>
      <button class="tb-btn primary" onclick="saveCell()">保存して閉じる</button>
    </div>
  </div>
</div>

<script>
  // 教科定義
  const SUBJECTS = [
    { name:"国語", color:"var(--kokugo)", bar:"#e8b840" }, { name:"算数", color:"var(--sansu)", bar:"#5599dd" },
    { name:"理科", color:"var(--rika)", bar:"#44aa66" }, { name:"社会", color:"var(--shakai)", bar:"#dd6666" },
    { name:"体育", color:"var(--taiiku)", bar:"#ee8833" }, { name:"音楽", color:"var(--ongaku)", bar:"#9966cc" },
    { name:"図工", color:"var(--zukou)", bar:"#dd8844" }, { name:"生活", color:"var(--seikatsu)", bar:"#ccaa00" },
    { name:"道徳", color:"var(--dotoku)", bar:"#44aa77" }, { name:"外国語", color:"var(--gaikokugo)", bar:"#3399bb" },
    { name:"総合", color:"var(--sogo)", bar:"#cc6699" }, { name:"学活", color:"var(--gakkatsu)", bar:"#7766bb" },
    { name:"行事", color:"var(--other)", bar:"#aaaaaa" }
  ];

  const times = ["朝", "1", "2", "3", "4", "5", "6", "放"];
  
  // データ構造（複数週保存対応）
  let appData = { className: "", jisu: {}, weeks: {} };
  let currentWeekKey = ""; // "YYYY-MM-DD" (必ず月曜日)
  let currentEditCell = null; 

  // 初期化
  function init() {
    renderTable();
    renderPresets();
    
    // データの読み込み
    const saved = localStorage.getItem("bestMixWeeklyPlanApp");
    if(saved) {
      try { appData = JSON.parse(saved); } catch(e){}
    }
    if(!appData.weeks) appData.weeks = {};
    if(!appData.jisu) appData.jisu = {};

    document.getElementById("class-name").value = appData.className || "";

    // 今日の日付から直近の月曜日を計算してセット
    let today = new Date();
    const diff = today.getDay() === 0 ? -6 : 1 - today.getDay();
    today.setDate(today.getDate() + diff);
    
    document.getElementById("start-date").value = today.toISOString().slice(0, 10);
    changeDate(false); // 日付変更処理（UI更新・データ展開）
  }

  // -------------------------------------------
  // 日付・週計算ロジック
  // -------------------------------------------
  function changeDate(shouldSaveOld = true) {
    if(shouldSaveOld && currentWeekKey) saveCurrentWeek();
    
    const startInput = document.getElementById("start-date").value;
    if (!startInput) return;
    
    // 入力された日付を月曜日に補正
    let d = new Date(startInput);
    const dayOfWeek = d.getDay();
    const diff = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
    d.setDate(d.getDate() + diff);
    
    currentWeekKey = d.toISOString().slice(0, 10);
    document.getElementById("start-date").value = currentWeekKey;
    
    // 各曜日の日付表示を更新
    const dates = [];
    for(let i=0; i<5; i++) {
      const current = new Date(d);
      current.setDate(d.getDate() + i);
      dates.push(current);
      document.getElementById(`date-${i}`).innerText = `${current.getMonth()+1}/${current.getDate()}`;
    }
    
    // 「●月 第●週」の計算（その週の木曜日を基準とする標準的な方法）
    const thursday = new Date(d);
    thursday.setDate(d.getDate() + 3);
    const month = thursday.getMonth() + 1;
    const tDate = thursday.getDate();
    const firstDay = new Date(thursday.getFullYear(), thursday.getMonth(), 1);
    const offset = (firstDay.getDay() + 6) % 7; // 月=0, 火=1...
    const weekNum = Math.ceil((tDate + offset) / 7);
    
    document.getElementById("title-text").innerText = `${month}月 第${weekNum}週 週間指導計画`;
    document.getElementById("date-range").innerText = `${dates[0].getMonth()+1}/${dates[0].getDate()} 〜 ${dates[4].getMonth()+1}/${dates[4].getDate()}`;
    
    loadCurrentWeek();
  }

  // 先週・来週への移動ボタン
  function shiftWeek(dir) {
    if(!currentWeekKey) return;
    saveCurrentWeek();
    let d = new Date(currentWeekKey);
    d.setDate(d.getDate() + (dir * 7));
    document.getElementById("start-date").value = d.toISOString().slice(0, 10);
    changeDate(false); 
  }

  // -------------------------------------------
  // データ保存・読み込み
  // -------------------------------------------
  function saveState() {
    saveCurrentWeek();
    renderJisu(); 
  }

  function saveCurrentWeek() {
    if(!currentWeekKey) return;
    const weekData = { cells: {}, notice: "" };
    times.forEach((_, r) => {
      for(let c=0; c<5; c++) {
        const id = `cell-${r}-${c}`;
        const subj = document.getElementById(`${id}-sub`).innerText.trim();
        const txt = document.getElementById(`${id}-txt`).innerText.trim();
        if(subj || txt) weekData.cells[id] = { subj, txt };
      }
    });
    weekData.notice = document.getElementById("notice-area").value;
    appData.weeks[currentWeekKey] = weekData;
    appData.className = document.getElementById("class-name").value;
    
    localStorage.setItem("bestMixWeeklyPlanApp", JSON.stringify(appData));
  }

  function loadCurrentWeek() {
    // 画面を一旦クリア
    times.forEach((_, r) => {
      for(let c=0; c<5; c++) {
        const id = `cell-${r}-${c}`;
        const subEl = document.getElementById(`${id}-sub`);
        const txtEl = document.getElementById(`${id}-txt`);
        if(subEl) { subEl.innerText = ""; subEl.style.backgroundColor = "transparent"; }
        if(txtEl) txtEl.innerText = "";
      }
    });
    document.getElementById("notice-area").value = "";

    // データがあれば反映
    const weekData = appData.weeks[currentWeekKey];
    if(weekData) {
      if(weekData.cells) {
        Object.keys(weekData.cells).forEach(id => {
          const cellData = weekData.cells[id];
          const subEl = document.getElementById(`${id}-sub`);
          const txtEl = document.getElementById(`${id}-txt`);
          if(subEl && txtEl) {
            subEl.innerText = cellData.subj;
            txtEl.innerText = cellData.txt;
            const found = SUBJECTS.find(s => s.name === cellData.subj);
            subEl.style.backgroundColor = found ? found.color : (cellData.subj ? "var(--surface2)" : "transparent");
          }
        });
      }
      if(weekData.notice) {
        document.getElementById("notice-area").value = weekData.notice;
      }
    }
    renderJisu();
  }

  // -------------------------------------------
  // UI 描画系
  // -------------------------------------------
  function renderTable() {
    const tbody = document.getElementById("schedule-body");
    let html = "";
    times.forEach((time, rowIndex) => {
      html += `<tr><th class="time-col">${time}</th>`;
      for(let colIndex=0; colIndex<5; colIndex++) {
        const cellId = `cell-${rowIndex}-${colIndex}`;
        html += `
          <td class="cell-td" id="${cellId}" onclick="openModal('${cellId}')">
            <div class="cell-sub-bar" id="${cellId}-sub"></div>
            <div class="cell-content" id="${cellId}-txt"></div>
          </td>`;
      }
      html += `</tr>`;
    });
    tbody.innerHTML = html;
  }

  function renderPresets() {
    const container = document.getElementById("subject-presets");
    SUBJECTS.forEach(s => {
      const btn = document.createElement("button");
      btn.className = "preset-btn";
      btn.style.backgroundColor = s.color;
      btn.innerText = s.name;
      btn.onclick = () => document.getElementById("modal-subject").value = s.name;
      container.appendChild(btn);
    });
  }

  // -------------------------------------------
  // 時数管理ロジック
  // -------------------------------------------
  function countWeekHours() {
    const counts = {};
    times.forEach((_, r) => {
      for(let c=0; c<5; c++) {
        const subEl = document.getElementById(`cell-${r}-${c}-sub`);
        const subj = subEl ? subEl.innerText.trim() : "";
        if(subj) counts[subj] = (counts[subj] || 0) + 1;
      }
    });
    return counts;
  }

  function renderJisu() {
    const counts = countWeekHours();
    const grid = document.getElementById("jisu-grid");
    grid.innerHTML = "";

    const subjectsToShow = new Set([...SUBJECTS.map(s=>s.name), ...Object.keys(counts), ...Object.keys(appData.jisu)]);

    subjectsToShow.forEach(subj => {
      if(!subj) return;
      const thisWeek = counts[subj] || 0;
      const data = appData.jisu[subj] || { plan: 0, done: 0 };
      const total = data.done + thisWeek;
      
      if(thisWeek === 0 && data.plan === 0 && data.done === 0) return;

      const found = SUBJECTS.find(s => s.name === subj);
      const barColor = found ? found.bar : "var(--accent)";
      const pct = data.plan > 0 ? Math.min(100, Math.round((total / data.plan) * 100)) : 0;

      const div = document.createElement("div");
      div.className = "jisu-card";
      div.innerHTML = `
        <div class="jisu-card-title" style="border-bottom-color: ${barColor}">
          ${subj} <span class="week-count">今週: ${thisWeek} 時</span>
        </div>
        <div class="jisu-row">
          <span>これまで</span>
          <input type="number" min="0" value="${data.done}" onchange="updateJisu('${subj}', 'done', this.value)">
        </div>
        <div class="jisu-row">
          <span>年間計画</span>
          <input type="number" min="0" value="${data.plan}" onchange="updateJisu('${subj}', 'plan', this.value)">
        </div>
        <div class="jisu-bar-bg"><div class="jisu-bar-fill" style="width: ${pct}%; background: ${barColor}"></div></div>
        <div class="jisu-total">累計: ${total} / ${data.plan || '?'} 時間</div>
      `;
      grid.appendChild(div);
    });
  }

  function updateJisu(subj, field, value) {
    if(!appData.jisu[subj]) appData.jisu[subj] = { plan: 0, done: 0 };
    appData.jisu[subj][field] = parseInt(value, 10) || 0;
    saveState();
  }

  // -------------------------------------------
  // モーダル操作
  // -------------------------------------------
  function openModal(cellId) {
    currentEditCell = cellId;
    document.getElementById("modal-subject").value = document.getElementById(`${cellId}-sub`).innerText;
    document.getElementById("modal-content").value = document.getElementById(`${cellId}-txt`).innerText;
    document.getElementById("modal-overlay").classList.add("open");
    document.getElementById("modal-content").focus();
  }

  function closeModal() {
    document.getElementById("modal-overlay").classList.remove("open");
    currentEditCell = null;
  }

  function clearCell() {
    document.getElementById("modal-subject").value = "";
    document.getElementById("modal-content").value = "";
    saveCell();
  }

  function saveCell() {
    if(!currentEditCell) return;
    const subj = document.getElementById("modal-subject").value.trim();
    const txt = document.getElementById("modal-content").value.trim();
    const subEl = document.getElementById(`${currentEditCell}-sub`);
    const txtEl = document.getElementById(`${currentEditCell}-txt`);
    
    subEl.innerText = subj;
    txtEl.innerText = txt;
    
    let matchedColor = "transparent";
    const found = SUBJECTS.find(s => s.name === subj);
    if(found) matchedColor = found.color;
    else if(subj) matchedColor = "var(--surface2)";
    subEl.style.backgroundColor = matchedColor;

    saveState();
    closeModal();
  }

  window.onload = init;
</script>
</body>
</html>
